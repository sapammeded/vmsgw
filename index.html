<script>
// ========== KONFIGURASI GLOBAL YANG BISA DIUBAH ==========
// ============================================================

// === DOMAIN LOCK (isi dengan domain worker atau biarkan kosong untuk nonaktif) ===
const ALLOWED_DOMAIN = "";  // Contoh: "mededsapam.workers.dev" atau "localhost"
// Jika kosong, domain lock TIDAK AKTIF

// === CLOUDFLARE WORKER URL ===
const CLOUDFLARE_WORKER_URL = "https://vmsgw.mededsapam.workers.dev";  // GANTI dengan URL worker anda

// === API KEY (sesuaikan dengan worker) ===
const API_SECURE_KEY = "VMS_SECURE_2026_9a7f3e2d";

// === LOGO URL (isi dengan link logo anda) ===
const LOGO_URL = "https://via.placeholder.com/40x40?text=VMS";
const SIDEBAR_LOGO_URL = "https://via.placeholder.com/120x40?text=VMS";

// === TITLE (bisa diubah) ===
const APP_TITLE = "VMS SAPAM MEDED";
const APP_SUBTITLE = "Licensed Build";

// === LICENSE KEY ===
const DEFAULT_LICENSE_KEY = "";

// ========== SECURITY CONFIGURATION ==========
// Rate limit: minimum milliseconds between scans per device (anti abuse only, tidak blok QR reuse)
const SCAN_RATE_LIMIT_MS = 2000; // 2 seconds between scans

// Maximum scans per minute per device (anti abuse)
const MAX_SCANS_PER_MINUTE = 30;

// ============================================================

// Apply konfigurasi ke DOM
document.addEventListener('DOMContentLoaded', function() {
    if(LOGO_URL && LOGO_URL !== "https://via.placeholder.com/40x40?text=VMS") {
        const mobileLogo = document.getElementById('mobileLogo');
        if(mobileLogo) {
            mobileLogo.src = LOGO_URL;
            mobileLogo.style.display = 'inline-block';
        }
    }
    
    if(SIDEBAR_LOGO_URL && SIDEBAR_LOGO_URL !== "https://via.placeholder.com/120x40?text=VMS") {
        const sidebarLogo = document.getElementById('sidebarLogo');
        const desktopSidebarLogo = document.getElementById('desktopSidebarLogo');
        if(sidebarLogo) {
            sidebarLogo.src = SIDEBAR_LOGO_URL;
            sidebarLogo.style.display = 'block';
        }
        if(desktopSidebarLogo) {
            desktopSidebarLogo.src = SIDEBAR_LOGO_URL;
            desktopSidebarLogo.style.display = 'block';
        }
    }
    
    const mobileTitle = document.getElementById('mobileTitle');
    const sidebarTitle = document.getElementById('sidebarTitle');
    const desktopSidebarTitle = document.getElementById('desktopSidebarTitle');
    const sidebarSubtitle = document.getElementById('sidebarSubtitle');
    const desktopSidebarSubtitle = document.getElementById('desktopSidebarSubtitle');
    
    if(mobileTitle) mobileTitle.innerText = APP_TITLE + " | " + APP_SUBTITLE;
    if(sidebarTitle) sidebarTitle.innerText = APP_TITLE.split(' ')[0];
    if(desktopSidebarTitle) desktopSidebarTitle.innerText = APP_TITLE.split(' ')[0];
    if(sidebarSubtitle) sidebarSubtitle.innerText = APP_SUBTITLE;
    if(desktopSidebarSubtitle) desktopSidebarSubtitle.innerText = "Enterprise Access";
});

// ========== DOMAIN LOCK (Layer 1 Security) ==========
if(ALLOWED_DOMAIN && ALLOWED_DOMAIN !== ""){
    if(location.hostname !== ALLOWED_DOMAIN && !location.hostname.includes(ALLOWED_DOMAIN)){
        document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;background:#0f2c2c;color:white;flex-direction:column'><h2>⛔ DOMAIN TIDAK TERDAFTAR</h2><p>Akses ditolak. Domain ini tidak memiliki lisensi.</p><p style='margin-top:20px;font-size:12px'>Hubungi administrator untuk aktivasi.</p></div>";
        throw new Error("DOMAIN LOCK TRIGGERED");
    }
}

window.SYSTEM_OWNER = "LICENSED_BUILD_VMS";
window.LICENSE_KEY = localStorage.getItem("VMS_LICENSE") || DEFAULT_LICENSE_KEY;
window.APP_MODE = "PRO";
window.BUILD_MODE = "PROTECTED";

if(window.LICENSE_KEY && DEFAULT_LICENSE_KEY === ""){
    Object.defineProperty(window, "LICENSE_KEY", {
        writable: false,
        configurable: false
    });
}

// ========== LICENSE SYSTEM (TIDAK MEMBLOK SCAN QR) ==========
async function validateLicense(){
    if(!window.LICENSE_KEY) return true;
    try{
        const controller = new AbortController();
        const timeout = setTimeout(()=>controller.abort(),5000);
        const res = await fetch(`${CLOUDFLARE_WORKER_URL}/license`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "x-api-key":API_SECURE_KEY
            },
            body: JSON.stringify({
                key: window.LICENSE_KEY,
                domain: location.hostname,
                timestamp: Date.now()
            }),
            signal: controller.signal
        });
        clearTimeout(timeout);
        const json = await res.json();
        return json.valid === true;
    }catch(e){
        console.warn("License validation skipped:", e);
        return true;
    }
}

// License hanya untuk cloud sync, TIDAK MEMBLOK SCAN QR
async function enforceLicense(){
    if(!window.LICENSE_KEY) return;
    if(!navigator.onLine) return;
    const valid = await validateLicense();
    if(!valid){
        console.warn("License invalid, running in offline mode");
        window.LICENSE_VALID = false;
        // TIDAK MEMBLOK APLIKASI - hanya warning
    }
}

// License bootstrap - tidak memblok akses
(async function licenseBootstrap(){
    if(!window.LICENSE_KEY) return;
    if(!navigator.onLine) return;
    const valid = await validateLicense();
    if(!valid){
        console.warn("License invalid, but system continues in offline mode");
        // TIDAK MEMBLOK - hanya console warning
    }
})();

setInterval(()=>{
    if(typeof window.saveStore !== "function"){
        location.reload();
    }
},5000);

setInterval(()=>{
    const start = performance.now();
    debugger;
    const end = performance.now();
    if(end - start > 100){
        console.warn("DEVTOOLS DETECTED");
    }
},3000);
// ================== PROTECTION LAYER END ==================

// ================== MAIN APP ==================
(async function(){
    let visitors = {};
    let logs = [];
    let auditLogs = [];
    const QR_SECRET = "VmsEnt2026!";
    let processingRegs = new Set();
    let isManualProcessing = false;
    
    // ========== ANTI ABUSE: Rate Limiting (anti spam only, tidak blok QR reuse) ==========
    let deviceScanHistory = new Map();
    let lastScanTime = new Map();
    
    function checkRateLimit(deviceId) {
        const now = Date.now();
        const lastScan = lastScanTime.get(deviceId);
        
        // Rate limit: minimum time between scans (anti spam only)
        if (lastScan && (now - lastScan) < SCAN_RATE_LIMIT_MS) {
            const waitTime = Math.ceil((SCAN_RATE_LIMIT_MS - (now - lastScan)) / 1000);
            toast(`Mohon tunggu ${waitTime} detik sebelum scan lagi`, "warning");
            return false;
        }
        
        // Anti spam: maximum scans per minute
        let history = deviceScanHistory.get(deviceId) || [];
        const oneMinuteAgo = now - 60000;
        history = history.filter(t => t > oneMinuteAgo);
        
        if (history.length >= MAX_SCANS_PER_MINUTE) {
            toast(`Terlalu banyak scan (${MAX_SCANS_PER_MINUTE}/menit). Coba lagi nanti.`, "error");
            return false;
        }
        
        history.push(now);
        deviceScanHistory.set(deviceId, history);
        lastScanTime.set(deviceId, now);
        
        if (deviceScanHistory.size > 100) {
            for (let [id, timestamps] of deviceScanHistory.entries()) {
                const filtered = timestamps.filter(t => t > now - 60000);
                if (filtered.length === 0) {
                    deviceScanHistory.delete(id);
                } else {
                    deviceScanHistory.set(id, filtered);
                }
            }
        }
        
        return true;
    }
    
    let deviceId = localStorage.getItem('vms_device_id');
    if(!deviceId){
        deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('vms_device_id', deviceId);
    }

    Object.defineProperty(window, "visitors", {
        get: () => visitors,
        set: (val) => { visitors = val || {}; }
    });

    function toast(msg, type='info'){
        let t = document.createElement('div');
        t.className = `toast-msg ${type}`;
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 3000);
    }

    function loadStore(){
        try {
            let v = localStorage.getItem('vms_visitors');
            let l = localStorage.getItem('vms_logs');
            let a = localStorage.getItem('vms_audit');
            if(v) visitors = JSON.parse(v);
            if(l) {
                const loadedLogs = JSON.parse(l);
                logs.length = 0;
                logs.push(...loadedLogs);
                window.logs = logs;
            }
            if(a) auditLogs = JSON.parse(a);
            
            const auditHash = btoa(JSON.stringify(auditLogs).slice(0,500));
            const savedHash = localStorage.getItem("vms_audit_hash");
            if(savedHash && savedHash !== auditHash){
                document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#0f2c2c;color:#ffaaaa'><h2>⚠️ AUDIT MODIFIED</h2></div>";
                throw new Error("AUDIT MODIFIED");
            }
            localStorage.setItem("vms_audit_hash", auditHash);
        } catch(e) { toast("Gagal load data", "error"); }
    }
    
    function verifyAuditChain(){
        for(let i = 1; i < auditLogs.length; i++){
            if(auditLogs[i].hashPrev !== auditLogs[i-1].hashNow){
                console.error("AUDIT TAMPER DETECTED");
                document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#0f2c2c;color:#ffaaaa'><h2>⚠️ SYSTEM LOCK — AUDIT CORRUPTED</h2></div>";
                throw new Error("AUDIT TAMPER");
            }
        }
    }
    
    function generateReg(){ return "REG"+Date.now()+Math.floor(Math.random() * 10000); }

    // ========== QR FUNCTIONS - TIDAK DIUBAH (CORE) ==========
    async function generateSignature(payload){
        const enc = new TextEncoder().encode(payload + QR_SECRET);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    async function buildQR(reg, data){
        const ts = Date.now();
        const nonce = Math.random().toString(36).substr(2, 15) + Date.now().toString(36);
        const payload = JSON.stringify({
            reg: reg,
            nama: data.nama,
            perusahaan: data.perusahaan,
            exp: data.expDate,
            ts: ts,
            nonce: nonce
        });
        const sig = await generateSignature(payload);
        return btoa(JSON.stringify({ payload, sig, ts, nonce }));
    }
    
    // ========== PARSE QR - UNLIMITED MODE (NONCE DINONAKTIFKAN & TIME LIMIT REMOVED) ==========
    async function parseQR(raw){
        try{
            const decoded = JSON.parse(atob(raw));
            const expectedSig = await generateSignature(decoded.payload);
            if(decoded.sig !== expectedSig) {
                toast("QR tidak valid: signature tidak cocok", "error");
                return null;
            }
            const payloadData = JSON.parse(decoded.payload);
            
            // DISABLED: QR TIME LIMIT REMOVED
            // Expiry dikontrol penuh oleh visitor.expDate
            /*
            const now = Date.now();
            if(payloadData.ts && (now - payloadData.ts) > 7 * 24 * 60 * 60 * 1000){
                toast("QR Code sudah kadaluarsa (lebih dari 7 hari)", "error");
                return null;
            }
            */
            
            // NONCE DISABLED — QR REUSABLE MODE
            /*
            if(payloadData.nonce){
                if(usedNonce.has(payloadData.nonce)){
                    toast("QR Code sudah pernah digunakan", "error");
                    return null;
                }
                usedNonce.add(payloadData.nonce);
                saveNonce();
            }
            */
            
            return payloadData;
        }catch(e){
            console.error("Parse QR error:", e);
            return null;
        }
    }

    async function addAuditLog(reg, action, dataHash){
        const prevHash = auditLogs.length > 0 ? auditLogs[auditLogs.length - 1].hashNow : '0';
        const nowHash = await generateSignature(JSON.stringify({ reg, action, time: Date.now(), dataHash, deviceId }));
        const auditRecord = {
            id: auditLogs.length + 1,
            reg: reg,
            action: action,
            time: Date.now(),
            deviceId: deviceId,
            hashPrev: prevHash,
            hashNow: nowHash
        };
        auditLogs.push(auditRecord);
        if(auditLogs.length > 10000) auditLogs.shift();
        localStorage.setItem('vms_audit', JSON.stringify(auditLogs));
        
        if(navigator.onLine && auditLogs.length > 0){
            const lastFive = auditLogs.slice(-5);
            if(Array.isArray(lastFive) && lastFive.length > 0){
                const timestamp = Date.now();
                const signaturePayload = JSON.stringify(lastFive) + timestamp + API_SECURE_KEY;
                const signatureEnc = new TextEncoder().encode(signaturePayload);
                const signatureHash = await crypto.subtle.digest('SHA-256', signatureEnc);
                const signature = btoa(String.fromCharCode(...new Uint8Array(signatureHash)));
                
                fetch(CLOUDFLARE_WORKER_URL + "/audit",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json",
                        "x-api-key":API_SECURE_KEY,
                        "X-Signature": signature,
                        "X-Timestamp": timestamp.toString()
                    },
                    body: JSON.stringify({
                        domain: location.hostname,
                        license: window.LICENSE_KEY,
                        data: lastFive,
                        deviceId: deviceId
                    })
                }).catch(()=>{});
            }
        }
    }

    function addLog(reg, action){
        let v = visitors[reg];
        const newLog = { reg, name: v?.nama||reg, company: v?.perusahaan||'', category: v?.kategori||'UMUM', action, time: Date.now(), deviceId: deviceId };
        logs.unshift(newLog);
        if(logs.length>1000) logs.pop();
        window.logs = logs;
        addAuditLog(reg, action, JSON.stringify(newLog));
        if(window.saveStore) window.saveStore();
        renderLogTable();
    }

    async function ensureJsPDFReady(){
        if(window.jspdf) return true;
        return new Promise((resolve)=>{
            let max = 100;
            let i = 0;
            const interval = setInterval(()=>{
                if(window.jspdf){
                    clearInterval(interval);
                    resolve(true);
                }
                if(i++ > max){
                    clearInterval(interval);
                    resolve(false);
                }
            },100);
        });
    }

    function forceDownloadPDF(doc, filename){
        try{
            const blob = doc.output("blob");
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => {
                URL.revokeObjectURL(url);
            }, 3000);
            return true;
        }catch(err){
            console.error("FORCE DOWNLOAD ERROR:", err);
            return false;
        }
    }

    async function loadQRFast(qrUrl){
        try{
            const img = new Image();
            img.crossOrigin = "Anonymous";
            return await Promise.race([
                new Promise((res)=>{
                    img.onload = ()=>res(img);
                    img.onerror = ()=>res(null);
                    img.src = qrUrl;
                }),
                new Promise(res=>setTimeout(()=>res(null),1500))
            ]);
        }catch(e){
            return null;
        }
    }

    async function downloadPDFStable(reg, data){
        try{
            const ready = await ensureJsPDFReady();
            if(!ready){
                toast("PDF engine gagal dimuat. Coba refresh.", "error");
                return false;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

            let headerColor = [31,78,74];
            if(data.kategori === "VVIP") headerColor = [217,119,6];
            else if(data.kategori === "VIP") headerColor = [100,116,139];

            doc.setFillColor(...headerColor);
            doc.rect(0,0,210,40,'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(22);
            doc.text("INVITATION LETTER",105,20,{align:"center"});
            doc.setFontSize(10);
            doc.text("Corporate Access System",105,32,{align:"center"});

            doc.setTextColor(0,0,0);
            doc.setFontSize(12);
            doc.setFont(undefined,'bold');
            doc.text("VISITOR INFORMATION",20,60);
            doc.setFontSize(10);
            doc.setFont(undefined,'normal');

            let y=75;
            doc.text(`Name : ${data.nama||"-"}`,20,y); y+=8;
            doc.text(`Company : ${data.perusahaan||"-"}`,20,y); y+=8;
            doc.text(`Purpose : ${data.tujuan||"-"}`,20,y); y+=8;
            doc.text(`PIC : ${data.pic||"-"}`,20,y); y+=8;
            doc.text(`Dept : ${data.dept||"-"}`,20,y); y+=8;
            doc.text(`Validity : ${data.startDate||"-"} → ${data.expDate||"-"}`,20,y);

            if(data.foto && data.foto.startsWith('data')){
                try{ doc.addImage(data.foto,'JPEG',20,y+10,30,30); }catch(e){}
            }

            const qrPayload = await buildQR(reg, data);
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(qrPayload)}`;
            const qrImg = await loadQRFast(qrUrl);

            if(qrImg){
                const cv = document.createElement('canvas');
                cv.width=120; cv.height=120;
                const ctx = cv.getContext('2d');
                ctx.fillStyle='white';

    async function capturePhoto(){

                let canvas = modalDiv.querySelector('#canvasWalk');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video,0,0);
                canvas.toBlob(blob=>{ 
                    stream.getTracks().forEach(t=>t.stop()); 
                    modalDiv.remove(); 
                    resolve(new File([blob],'walkin.jpg',{type:'image/jpeg'})); 
                },'image/jpeg',0.8);
            };
            modalDiv.querySelector('#closeWalkBtn').onclick = () => { 
                stream.getTracks().forEach(t=>t.stop()); 
                modalDiv.remove(); 
                resolve(null); 
            };

    let scannerInstance = null;
    let isScanning = false;
    let lastScans = new Map();
    let currentCameraId = null;

    async function initScanner() {
        if (scannerInstance) {
            await stopScanner();
        }
        
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras || cameras.length === 0) {
                toast("Tidak ada kamera terdeteksi", "error");
                return false;
            }
            
            const backCamera = cameras.find(cam => 
                cam.label.toLowerCase().includes('back') || 
                cam.label.toLowerCase().includes('rear') ||
                cam.label.toLowerCase().includes('belakang')
            );
            
            currentCameraId = backCamera ? backCamera.id : cameras[0].id;
            scannerInstance = new Html5Qrcode("cameraPreview");
            return true;
        } catch (err) {
            console.error("Init scanner error:", err);
            toast("Gagal inisialisasi kamera", "error");
            return false;
        }
    }

    async function startScanner() {
        if (isScanning) return;
        if (!scannerInstance) {
            const init = await initScanner();
            if (!init) return;
        }
        
        try {
            await scannerInstance.start(
                currentCameraId,
                {
                    fps: 10,
                    qrbox: { width: 280, height: 280 },
                    aspectRatio: 1.0
                },
                async (decodedText) => {
                    const now = Date.now();
                    const lastTime = lastScans.get(decodedText);
                    
                    if (lastTime && (now - lastTime) < 3000) {
                        return;
                    }
                    
                    lastScans.set(decodedText, now);
                    if (lastScans.size > 100) {
                        const oldest = [...lastScans.entries()].reduce((a, b) => a[1] < b[1] ? a : b);
                        lastScans.delete(oldest[0]);
                    }
                    
                    if (processingRegs.has(decodedText)) {
                        return;
                    }
                    
                    if (!checkRateLimit(deviceId)) {
                        return;
                    }
                    
                    try {
                        await processScan(decodedText);
                        playBeep('success');
                        flashOverlay('success');
                    } catch (err) {
                        console.error("Process scan error:", err);
                        playBeep('error');
                        flashOverlay('error');
                    }
                },
                (error) => {
                    if (error && !error.includes("No MultiFormat Readers")) {
                        console.log("Scan error:", error);
                    }
                }
            );
            
            isScanning = true;
            toast("Scanner siap - arahkan ke QR", "success");
            
        } catch (err) {
            console.error("Start scanner error:", err);
            toast("Gagal start kamera: " + err.message, "error");
            isScanning = false;
        }
    }

    async function stopScanner() {
        if (scannerInstance && isScanning) {
            try {
                await scannerInstance.stop();
                await scannerInstance.clear();
            } catch (err) {
                console.error("Stop scanner error:", err);
            }
        }
        isScanning = false;
    }

    function playBeep(type) {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'success') {
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else {
                oscillator.frequency.value = 440;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
                oscillator.stop(audioContext.currentTime + 0.5);
            }
            
            setTimeout(() => audioContext.close(), 500);
        } catch (err) {
            console.log("Beep error:", err);
        }
    }

    function flashOverlay(type) {
        let overlay = document.getElementById('scannerOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'scannerOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 9999;
                transition: opacity 0.1s ease;
                opacity: 0;
            `;
            document.body.appendChild(overlay);
        }
        
        overlay.style.backgroundColor = type === 'success' ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.6)';
        overlay.style.opacity = '1';
        
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 150);
    }

    // ========== PROCESS SCAN - UNLIMITED MODE ==========
    // License check tidak memblok scan QR
    async function processScan(qrText){
        // License check - tidak memblok scan QR, hanya logging
        if(window.LICENSE_KEY && navigator.onLine){
            validateLicense().catch(()=>{});
        }
        
        let mode = document.getElementById('scanMode').value;
        
        let payload = await parseQR(qrText);
        if(!payload){ 
            toast("QR TIDAK VALID - Bukan dari sistem VMS ini atau QR sudah kadaluarsa", "error"); 
            return; 
        }
        
        let reg = payload.reg;
        if(!reg){
            toast("QR tidak mengandung REG number yang valid", "error");
            return;
        }
        
        if(processingRegs.has(reg)){
            toast("Sedang diproses, tunggu sebentar","warning");
            return;
        }
        processingRegs.add(reg);
        
        try {
            let visitor = visitors[reg];
            if(!visitor){ 
                toast(`Visitor dengan REG ${reg} tidak ditemukan di database`, "error"); 
                return; 
            }
            
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ 
                toast("QR sudah expired (melewati masa berlaku)", "error"); 
                return; 
            }
            
            // STATUS LOCK DIHAPUS - QR REUSABLE UNLIMITED
            if(mode === "CHECK_IN"){
                // CHECK-IN UNLIMITED - selalu buat sesi baru
                if(!visitor.sessions) visitor.sessions = [];
                
                visitor.sessions.push({
                    checkIn: Date.now(),
                    checkOut: null
                });
                
                visitors[reg] = {
                    ...visitor,
                    currentStatus: "IN",
                    updatedAt: Date.now(),
                    version: (visitor.version || 0) + 1,
                    deviceId: deviceId,
                    syncStatus: visitor.syncStatus || "PENDING"
                };
                
                addLog(reg, "CHECK_IN");
                toast(`✅ CHECK-IN ${visitor.nama} berhasil`, "success");
                
            } else {
                // CHECK-OUT UNLIMITED - cari sesi aktif terakhir
                if(!visitor.sessions) visitor.sessions = [];
                
                let openSession = [...visitor.sessions].reverse().find(s => !s.checkOut);
                
                if(openSession){
                    openSession.checkOut = Date.now();
                } else {
                    visitor.sessions.push({
                        checkIn: null,
                        checkOut: Date.now()
                    });
                }
                
                visitors[reg] = {
                    ...visitor,
                    currentStatus: "OUT",
                    updatedAt: Date.now(),
                    version: (visitor.version || 0) + 1,
                    deviceId: deviceId,
                    syncStatus: visitor.syncStatus || "PENDING"
                };
                
                addLog(reg, "CHECK_OUT");
                toast(`✅ CHECK-OUT ${visitor.nama} berhasil`, "success");
            }
            
            renderDashboard(); 
            renderLogTable();
            if(window.saveStore) window.saveStore();
            
        } catch(err) {
            console.error("Process error:", err);
            toast("Terjadi error saat memproses: " + err.message, "error");
        } finally {
            setTimeout(()=>processingRegs.delete(reg), 1000);
        }
    }

    document.getElementById('deleteAllBtn').onclick = () => { 
        visitors = {}; 
        window.visitors = visitors;
        logs.length = 0;
        window.logs = logs;
        if(window.saveStore) window.saveStore(); 
        renderDashboard(); 
        renderLogTable(); 
        toast("All data cleared","info"); 
    };
    
    document.getElementById('exportExcelAction').onclick = async () => {
        // License check tidak memblok export
        if(window.LICENSE_KEY && navigator.onLine){
            validateLicense().catch(()=>{});
        }
        
        try {
            if(!window.XLSX){
                toast("Excel engine belum siap", "error");
                return;
            }

            const dataForExcel = [];
            
            Object.entries(visitors).forEach(([reg, visitor]) => {
                if (visitor.sessions && visitor.sessions.length > 0) {
                    visitor.sessions.forEach((session, idx) => {
                        const checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                        const checkOutDate = session.checkOut ? new Date(session.checkOut) : null;
                        
                        const formatDateTime = (date) => {
                            if(!date) return "-";
                            const y = date.getFullYear();
                            const m = String(date.getMonth() + 1).padStart(2, '0');
                            const d = String(date.getDate()).padStart(2, '0');
                            const h = String(date.getHours()).padStart(2, '0');
                            const mi = String(date.getMinutes()).padStart(2, '0');
                            const s = String(date.getSeconds()).padStart(2, '0');
                            return `${y}-${m}-${d} ${h}:${mi}:${s}`;
                        };
                        
                        let durationMinutes = null;
                        let durationText = "-";
                        let statusText = "IN PROGRESS";
                        
                        if (session.checkIn && session.checkOut) {
                            durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000);
                            durationText = durationMinutes.toString();
                            statusText = "COMPLETED";
                        } else if (session.checkIn && !session.checkOut) {
                            durationText = "IN PROGRESS";
                            statusText = "IN PROGRESS";
                        } else if (!session.checkIn && session.checkOut) {
                            statusText = "CHECKOUT ONLY";
                        }
                        
                        dataForExcel.push({
                            "Nama": visitor.nama,
                            "No. Registrasi": reg,
                            "Perusahaan": visitor.perusahaan,
                            "Kategori": visitor.kategori,
                            "Tujuan": visitor.tujuan,
                            "PIC": visitor.pic,
                            "Departemen": visitor.dept,
                            "Sesi Ke": idx + 1,
                            "Check-In": formatDateTime(checkInDate),
                            "Check-Out": formatDateTime(checkOutDate),
                            "Durasi (menit)": durationText,
                            "Status": statusText,
                            "Masa Berlaku": visitor.expDate || "-",
                            "Device ID": visitor.deviceId || "-"
                        });
                    });
                } else {
                    dataForExcel.push({
                        "Nama": visitor.nama,
                        "No. Registrasi": reg,
                        "Perusahaan": visitor.perusahaan,
                        "Kategori": visitor.kategori,
                        "Tujuan": visitor.tujuan,
                        "PIC": visitor.pic,
                        "Departemen": visitor.dept,
                        "Sesi Ke": "-",
                        "Check-In": "-",
                        "Check-Out": "-",
                        "Durasi (menit)": "-",
                        "Status": "TERDAFTAR (Belum ada aktivitas)",
                        "Masa Berlaku": visitor.expDate || "-",
                        "Device ID": visitor.deviceId || "-"
                    });
                }
            });

            const ws = XLSX.utils.json_to_sheet(dataForExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "VMS_Audit_Log_Sessions");
            XLSX.writeFile(wb, `VMS_Full_Report_${Date.now()}.xlsx`);

            toast("Excel dengan riwayat sesi lengkap berhasil di export", "success");

        } catch(err){
            console.error(err);
            toast("Export gagal", "error");
        }
    };
    
    document.getElementById('backupAction').onclick = () => {
        let a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([JSON.stringify({visitors,logs,auditLogs})],{type:"application/json"})); 
        a.download = `vms_backup_${Date.now()}.json`; 
        a.click(); 
        toast("Backup ready","success");
    };
    document.getElementById('resetDatabaseAction').onclick = () => { 
        visitors = {}; 
        window.visitors = visitors;
        logs.length = 0;
        window.logs = logs;
        auditLogs = [];
        if(window.saveStore) window.saveStore(); 
        renderDashboard(); 
        renderLogTable(); 
        toast("Database reset","info"); 
    };
    document.getElementById('regPhotoFile').onchange = (e) => { if(e.target.files[0]){ let r=new FileReader(); r.onload=ev=>document.getElementById('previewPhotoThumb').src=ev.target.result; r.readAsDataURL(e.target.files[0]); } };

    const panes = { dashboard: document.getElementById('dashboardPane'), register: document.getElementById('registerPane'), scanner: document.getElementById('scannerPane'), logs: document.getElementById('logsPane') };
    function switchTab(tabId){
        Object.values(panes).forEach(p=>p.classList.remove('active-pane'));
        if(panes[tabId]) panes[tabId].classList.add('active-pane');
        document.querySelectorAll('.nav-item').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
        document.querySelectorAll('.mobile-nav').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
    }
    document.querySelectorAll('.nav-item, .mobile-nav').forEach(el=>{
        if(el.dataset && el.dataset.tab){
            el.addEventListener('click',()=>{ switchTab(el.dataset.tab); if(window.innerWidth<=780) document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; });
        }

    document.getElementById('mobileMenuBtn').onclick = () => { document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; };
    document.getElementById('overlay').onclick = () => { document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; };
    window.addEventListener('resize',()=>{ if(window.innerWidth>780){ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; } });

    loadStore();

<script>
// ========== SYNC ENGINE (IndexedDB + Cloud Sync) ==========
(function(){
    if(window.__WAR_CORE_FINAL__) return;
    window.__WAR_CORE_FINAL__ = true;

    const SYNC_INTERVAL = 5000;
    const DB_NAME = "VMS_DB";
    let db;

    function initDB(){
        return new Promise((resolve, reject)=>{
            const req = indexedDB.open(DB_NAME, 2);
            req.onupgradeneeded = e=>{
                db = e.target.result;
                if(!db.objectStoreNames.contains("visitors")){
                    db.createObjectStore("visitors",{keyPath:"reg"});
                }
                if(!db.objectStoreNames.contains("logs")){
                    db.createObjectStore("logs",{autoIncrement:true});
                }
                if(!db.objectStoreNames.contains("audit")){
                    db.createObjectStore("audit",{autoIncrement:true});
                }
            };
            req.onsuccess = e=>{ db = e.target.result; resolve(); };
            req.onerror = (e)=>{ console.error("DB error:", e); reject(e); };
        });
    }

    async function saveOffline(reg,data){
        if(!db) await initDB();
        const tx = db.transaction("visitors","readwrite");
        tx.onerror = ()=> console.error("DB ERROR");
        tx.objectStore("visitors").put({
            reg,
            ...data,
            updatedAt: data.updatedAt || Date.now(),
            lastSync: data.lastSync || 0,
            version: data.version || 0,
            deviceId: data.deviceId || '',
            syncStatus: data.syncStatus || "PENDING"
        });
    }

    async function saveLogsOffline(logsData){
        if(!db) await initDB();
        const tx = db.transaction("logs","readwrite");
        tx.onerror = ()=> console.error("DB ERROR");
        const store = tx.objectStore("logs");
        store.clear();
        logsData.forEach(log => store.add(log));
    }

    async function loadOffline(){
        if(!db) await initDB();
        const visitors = await new Promise(res=>{
            const tx = db.transaction("visitors","readonly");
            const req = tx.objectStore("visitors").getAll();
            req.onsuccess = ()=>res(req.result||[]);
            req.onerror = ()=>res([]);
        });
        const logsOffline = await new Promise(res=>{
            const tx = db.transaction("logs","readonly");
            const req = tx.objectStore("logs").getAll();
            req.onsuccess = ()=>res(req.result||[]);
            req.onerror = ()=>res([]);
        });
        return { visitors, logs: logsOffline };
    }

    (async ()=>{
        await initDB();
        const offlineData = await loadOffline();
        offlineData.visitors.forEach(v=>{
            const local = window.visitors?.[v.reg];
            const localVersion = local?.version || 0;
            const cloudVersion = v.version || 0;
            
            if(!local){
                if(window.visitors) window.visitors[v.reg] = v;
            }
            else if(cloudVersion > localVersion){
                if(window.visitors) window.visitors[v.reg] = v;
            }
            else if(cloudVersion === localVersion){
                const cloudTime = v.updatedAt || 0;
                const localTime = local?.updatedAt || 0;
                if(cloudTime > localTime){
                    if(window.visitors) window.visitors[v.reg] = v;
                }
                else if(cloudTime === localTime){
                    if((v.deviceId || "") > (local?.deviceId || "")){
                        if(window.visitors) window.visitors[v.reg] = v;
                    }
                }
            }
        });
        if(offlineData.logs && offlineData.logs.length > 0 && (!window.logs || window.logs.length === 0)){
            if(window.logs){
                window.logs.length = 0;
                window.logs.push(...offlineData.logs);
            }
        }
        if(window.renderDashboard) window.renderDashboard();
        if(window.renderLogTable) window.renderLogTable();
    })();

    window.saveStore = async function(){
        if(window.saving) return;
        window.saving = true;
        
        // License check tidak memblok save
        if(window.LICENSE_KEY && navigator.onLine){
            validateLicense().catch(()=>{});
        }

        try {
            try {
                localStorage.setItem('vms_visitors', JSON.stringify(window.visitors || {}));
                localStorage.setItem('vms_logs', JSON.stringify((window.logs || []).slice(0,1000)));
            } catch(e){
                if(e.name === 'QuotaExceededError'){
                    if(window.toast) window.toast("Penyimpanan penuh, hapus beberapa data lama", "error");
                } else {
                    if(window.toast) window.toast("Gagal menyimpan", "error");
                }
            }

            const visitors = window.visitors || {};
            const entries = Object.entries(visitors);

            for(const [reg,data] of entries){
                await saveOffline(reg, data);
            }
            
            if(window.logs && window.logs.length){
                await saveLogsOffline(window.logs);
            }

            if(entries.length > 0){
                const batch = entries.slice(-10);
                
                const syncPromises = batch.map(async ([reg,data]) => {
                    let success = false;
                    let retries = 0;
                    const maxRetries = 2;
                    
                    while(retries <= maxRetries && !success){
                        try{
                            const controller = new AbortController();
                            const timeoutId = setTimeout(()=>controller.abort(), 8000);
                            
                            const response = await fetch(`${CLOUDFLARE_WORKER_URL}/save`,{
                                method:"POST",
                                headers:{
                                    'Content-Type':'application/json',
                                    'x-api-key': API_SECURE_KEY
                                },
                                body: JSON.stringify({
                                    reg,
                                    ...data,
                                    updatedAt: data.updatedAt || Date.now(),
                                    version: data.version || 0,
                                    deviceId: data.deviceId || '',
                                    syncStatus: data.syncStatus || "PENDING",
                                    domain: location.hostname,
                                    license: window.LICENSE_KEY,
                                    key: window.LICENSE_KEY,
                                    timestamp: Date.now()
                                }),
                                signal: controller.signal
                            });
                            clearTimeout(timeoutId);
                            
                            if(response.ok){
                                data.lastSync = Date.now();
                                data.syncStatus = "SYNCED";
                                if(window.visitors) window.visitors[reg] = data;
                                await saveOffline(reg, data);
                                success = true;
                            }else{
                                data.syncStatus = "FAILED";
                                throw new Error("Response not ok");
                            }
                        } catch(e){
                            retries++;
                            if(retries > maxRetries){
                                console.warn("Cloud sync error for", reg, e);
                                data.syncStatus = "FAILED";
                            } else {
                                await new Promise(r=>setTimeout(r, 1000));
                            }
                        }
                    }
                });
                
                await Promise.all(syncPromises);

                if(window.toast){
                    if(!window.__lastSyncToast || Date.now() - window.__lastSyncToast > 10000){
                        window.toast("Cloud sync aktif","success");
                        window.__lastSyncToast = Date.now();
                    }
                }
            }
        } finally {
            window.saving = false;
        }
    };

    async function fetchCloud(){
        if(window.fetching || window.saving) return;
        window.fetching = true;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(()=>controller.abort(), 8000);
            
            const res = await fetch(`${CLOUDFLARE_WORKER_URL}/dump`, { 
                signal: controller.signal,
                headers: { 
                    'x-api-key': API_SECURE_KEY,
                    'Content-Type': 'application/json',
                    'X-Timestamp': Date.now().toString()
                },
                body: JSON.stringify({
                    domain: location.hostname,
                    license: window.LICENSE_KEY,
                    key: window.LICENSE_KEY,
                    deviceId: localStorage.getItem('vms_device_id')
                }),
                method: "POST"
            });
            clearTimeout(timeoutId);
            
            const json = await res.json();
            
            if(!json || !json.valid || !Array.isArray(json.data)) return;

            let changed = false;

            for (const v of json.data) {
                const local = window.visitors?.[v.reg];
                const localVersion = local?.version || 0;
                const cloudVersion = v.version || 0;
                
                if(!local){
                    if(window.visitors) window.visitors[v.reg] = v;
                    await saveOffline(v.reg, v);
                    changed = true;
                }
                else if(cloudVersion > localVersion){
                    if(window.visitors) window.visitors[v.reg] = v;
                    await saveOffline(v.reg, v);
                    changed = true;
                }
                else if(cloudVersion === localVersion){
                    const cloudTime = v.updatedAt || 0;
                    const localTime = local?.updatedAt || 0;
                    if(cloudTime > localTime){
                        if(window.visitors) window.visitors[v.reg] = v;
                        await saveOffline(v.reg, v);
                        changed = true;
                    }
                    else if(cloudTime === localTime){
                        if((v.deviceId || "") > (local?.deviceId || "")){
                            if(window.visitors) window.visitors[v.reg] = v;
                            await saveOffline(v.reg, v);
                            changed = true;
                        }
                    }
                }
            }

            if(changed){
                if(window.renderDashboard) window.renderDashboard();
                if(window.renderLogTable) window.renderLogTable();
            }

        } catch(e){
            console.log("fetchCloud error:", e);
        } finally {
            window.fetching = false;
        }
    }

    setInterval(fetchCloud, SYNC_INTERVAL);

    window.addEventListener("online", ()=>{
        if(window.toast) window.toast("Online — sync aktif","success");
        fetchCloud();
        if(window.saveStore) window.saveStore();
    });

    window.addEventListener("offline", ()=>{
        if(window.toast) window.toast("Offline mode","info");
    });

    console.log("✅ WAR CORE FINAL ENGINE ACTIVE - Offline + Realtime Sync + Protection");
})();
</script>

<script id="ui-config-helper">
(function() {
    const _UI_THEME_KEY = "69acb947b4aa5eea8f6cb50080b67c7f4c14f70b1aa9c6e22ac1fd1151b90dea";

    const _cryptoSystem = async (val) => {
        const msgUint8 = new TextEncoder().encode(val);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer))
                    .map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const _interfaceManager = {
        tapCount: 0,
        resetTimer: null,

        executeSystemRefresh: async function() {
            const auth = prompt("OTORITAS SISTEM DIPERLUKAN:");
            if (!auth) return;

            const validated = await _cryptoSystem(auth);
            if (validated === _UI_THEME_KEY) {
                if (confirm("Akses Diterima. Jalankan pembersihan cache dan reset sistem?")) {
                    localStorage.clear();
                    sessionStorage.clear();
                    alert("SISTEM BERHASIL DI-RESET!");
                    location.reload();
                }
            } else {
                alert("AKSES DITOLAK: Otoritas tidak valid.");
            }
        },

        init: function() {
            const selectors = [
                '.sidebar-logo', 
                '.mobile-logo',
                '.logo-area'
            ];
            
            selectors.forEach(selector => {
                const target = document.querySelector(selector);
                if (target) {
                    target.style.cursor = "pointer";
                    target.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.tapCount++;
                        clearTimeout(this.resetTimer);

                        if (this.tapCount >= 5) {
                            this.tapCount = 0;
                            this.executeSystemRefresh();
                        }

                        this.resetTimer = setTimeout(() => { this.tapCount = 0; }, 2000);
                    });
                }
            });
        }
    };

    _interfaceManager.init();
})();
</script>

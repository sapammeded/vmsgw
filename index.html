<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VMS SAPAM MEDED | Ultimate Access System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #1a2c3e; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #0f2c2c; color: #e2e8f0; position: fixed; height: 100vh; overflow-y: auto; z-index: 20; }
        .logo-area { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h1 { font-size: 1.6rem; font-weight: 600; color: white; }
        .logo-area p { font-size: 0.7rem; color: #8ea5a5; margin-top: 6px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 24px; margin: 4px 12px; border-radius: 14px; color: #cbdcd9; font-weight: 500; cursor: pointer; }
        .nav-item.active { background: #2b5a55; color: white; }
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; width: calc(100% - 280px); }
        .mobile-header { display: none; background: #0f2c2c; padding: 16px 20px; color: white; align-items: center; justify-content: space-between; }
        .menu-toggle { background: none; border: none; font-size: 1.8rem; color: white; cursor: pointer; }
        .mobile-sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #0f2c2c; z-index: 200; transition: 0.2s; padding-top: 20px; }
        .mobile-sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 199; display: none; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 36px; }
        .stat-card { background: white; border-radius: 24px; padding: 22px 20px; border: 1px solid #e2edf2; }
        .stat-card h4 { font-size: 0.7rem; text-transform: uppercase; color: #5f7f7c; margin-bottom: 12px; }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #1f4e4a; }
        .form-card { background: white; border-radius: 28px; padding: 28px 30px; border: 1px solid #e7edf2; margin-bottom: 28px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px 32px; }
        .input-field { display: flex; flex-direction: column; gap: 6px; }
        .input-field label { font-size: 0.7rem; font-weight: 600; color: #2b5a55; text-transform: uppercase; }
        input, select { padding: 12px 14px; border-radius: 18px; border: 1px solid #d4e0e5; font-size: 0.9rem; }
        button { background: #1f4e4a; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1f4e4a; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .badge-VVIP { background: #fde68a; color: #92400e; }
        .badge-VIP { background: #e2e8f0; color: #334155; }
        .badge-UMUM { background: #d1fae5; color: #065f46; }
        .toast-msg { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 0.8rem; animation: fadeIn 0.2s; }
        .toast-msg.success { background: #1f4e4a; }
        .toast-msg.error { background: #b91c1c; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card { background: white; width: 480px; max-width: 90%; border-radius: 32px; padding: 28px; }
        .qr-preview { width: 120px; margin: 16px auto; display: block; }
        .flex-btns { display: flex; gap: 12px; margin-top: 20px; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; animation: fade 0.2s; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .table-wrap { overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 16px; background: #f8fafc; color: #1f4e4a; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 16px; border-bottom: 1px solid #edf2f7; }
        #cameraPreview { width: 100%; max-width: 500px; background: #000; border-radius: 24px; overflow: hidden; min-height: 200px; }
        @media (max-width: 780px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; width: 100%; padding: 16px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
        .error-fallback { background: #fef2f2; border: 1px solid #fecaca; border-radius: 16px; padding: 20px; text-align: center; color: #991b1b; margin: 20px; }
    </style>
</head>
<body>
<div id="temp-reader" style="display:none;"></div>

<div class="mobile-header">
    <button class="menu-toggle" id="mobileMenuBtn">☰</button>
    <strong style="font-size: 1.2rem;">VMS SAPAM MEDED | Ultimate Access</strong>
    <div style="width: 28px;"></div>
</div>
<div class="overlay" id="overlay"></div>
<div class="mobile-sidebar" id="mobileSidebar">
    <div class="logo-area"><h1>VMS</h1><p>Access Control</p></div>
    <div class="nav-item mobile-nav" data-tab="dashboard">📊 Dashboard</div>
    <div class="nav-item mobile-nav" data-tab="register">📝 Register</div>
    <div class="nav-item mobile-nav" data-tab="scanner">📷 Scanner</div>
    <div class="nav-item mobile-nav" data-tab="logs">📜 Logs</div>
</div>

<div class="app-layout">
    <div class="sidebar">
        <div class="logo-area"><h1>VMS</h1><p>Enterprise Access</p></div>
        <div class="nav-item active" data-tab="dashboard">📊 Dashboard</div>
        <div class="nav-item" data-tab="register">📝 Register Visitor</div>
        <div class="nav-item" data-tab="scanner">📷 Security Scan</div>
        <div class="nav-item" data-tab="logs">📜 Audit Logs</div>
    </div>

    <div class="main-content">
        <div id="dashboardPane" class="tab-pane active-pane">
            <div class="stats-row" id="statsWidget"></div>
            <div class="form-card"><canvas id="trendChart" height="90"></canvas></div>
            <div class="form-card"><canvas id="categoryChart" height="90"></canvas></div>
        </div>

        <div id="registerPane" class="tab-pane">
            <div class="form-card">
                <div class="grid-2">
                    <div class="input-field"><label>Full name</label><input type="text" id="regName" placeholder="John Carter"></div>
                    <div class="input-field"><label>Company</label><input type="text" id="regCompany" placeholder="PT Nusantara"></div>
                    <div class="input-field"><label>Category</label><select id="regCategory"><option value="UMUM">UMUM</option><option value="VIP">VIP</option><option value="VVIP">VVIP</option></select></div>
                    <div class="input-field"><label>Purpose</label><select id="regPurpose"><option>Meeting</option><option>Interview</option><option>Service</option><option>Lainnya</option></select><input type="text" id="regCustomPurpose" placeholder="Other purpose" style="margin-top:8px;"></div>
                    <div class="input-field"><label>PIC</label><input type="text" id="regPic" placeholder="Budi Santoso"></div>
                    <div class="input-field"><label>Department</label><input type="text" id="regDept" placeholder="IT / HR"></div>
                    <div class="input-field"><label>Start date</label><input type="date" id="regStartDate"></div>
                    <div class="input-field"><label>Expired date</label><input type="date" id="regExpDate"></div>
                    <div class="input-field"><label>Photo (optional)</label><input type="file" id="regPhotoFile" accept="image/*"><img id="previewPhotoThumb" width="50" style="margin-top:8px; border-radius:12px;"></div>
                </div>
                <div style="display:flex; gap: 16px; margin-top: 24px; flex-wrap:wrap;">
                    <button id="walkinBtn">⚡ Walk-in Cepat</button>
                    <button id="generateQRBtn">🔐 Generate QR & Register</button>
                </div>
            </div>
        </div>

        <div id="scannerPane" class="tab-pane">
            <div class="form-card">
                <div style="display:flex; gap: 12px; flex-wrap:wrap; margin-bottom:20px;">
                    <select id="scanMode"><option value="CHECK_IN">CHECK-IN</option><option value="CHECK_OUT">CHECK-OUT</option></select>
                    <button id="startCamBtn">📷 Start Camera</button>
                    <button id="stopCamBtn" class="btn-outline">Stop</button>
                    <button id="uploadQrBtn">🖼️ Upload QR</button>
                    <input type="file" id="uploadQrFile" accept="image/*" style="display:none">
                </div>
                <div id="cameraPreview"></div>
                <div class="input-field" style="margin-top:24px;"><label>Manual REG Number</label><input type="text" id="manualReg" placeholder="REG2026xxxx"><button id="manualProcess" style="margin-top:8px;">Proses</button></div>
            </div>
        </div>

        <div id="logsPane" class="tab-pane">
            <div class="form-card">
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px;">
                    <input type="text" id="searchLog" placeholder="Cari Nama / REG" style="width:200px;">
                    <button id="refreshLogsBtn">Refresh</button>
                    <button id="selectAllBtn">Select all</button>
                    <button id="deselectAllBtn">Deselect</button>
                    <button id="deleteSelectedBtn" style="background:#b91c1c;">Hapus terpilih</button>
                    <button id="deleteAllBtn" style="background:#b91c1c;">Hapus semua</button>
                    <button id="exportExcelAction">Export Excel</button>
                    <button id="backupAction">Backup</button>
                    <button id="resetDatabaseAction" style="background:#92400e;">Reset DB</button>
                </div>
                <div class="table-wrap">
                    <table id="logTable">
                        <thead><tr><th><input type="checkbox" id="checkAllMaster"></th><th>REG</th><th>Nama</th><th>Perusahaan</th><th>Kategori</th><th>Aksi</th><th>Waktu</th><th>PDF</th></tr></thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// GLOBAL ERROR HANDLER - ANTI BLANK WHITE SCREEN
// ============================================================
window.onerror = function(msg, url, line, col, error) {
    console.error('GLOBAL ERROR:', msg, error);
    const errorDiv = document.createElement('div');
    errorDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;background:#dc2626;color:white;padding:12px;border-radius:12px;z-index:99999;font-size:12px;text-align:center;';
    errorDiv.innerHTML = `⚠️ System error: ${msg.substring(0, 100)}. Refresh jika perlu.`;
    document.body.appendChild(errorDiv);
    setTimeout(() => errorDiv.remove(), 5000);
    return true;
};

window.onunhandledrejection = function(e) {
    console.error('UNHANDLED REJECTION:', e.reason);
    const errorDiv = document.createElement('div');
    errorDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;background:#dc2626;color:white;padding:12px;border-radius:12px;z-index:99999;font-size:12px;text-align:center;';
    errorDiv.innerHTML = `⚠️ Async error: ${e.reason?.message || 'Unknown error'}. Refresh jika perlu.`;
    document.body.appendChild(errorDiv);
    setTimeout(() => errorDiv.remove(), 5000);
    e.preventDefault();
    return true;
};

// ============================================================
// VMS ULTIMATE MODE - UNLIMITED SCAN | NO NONCE | NO STATUS LOCK
// ============================================================
(async function(){
    let visitors = {};
    let logs = [];
    let auditLogs = [];
    const QR_SECRET = "VmsEnt2026!";
    let processingRegs = new Set();
    let isManualProcessing = false;
    
    // ✅ NONCE TOTALLY DISABLED - NO VALIDATION
    
    // Multi device support
    let deviceId = localStorage.getItem('vms_device_id');
    if(!deviceId){
        deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('vms_device_id', deviceId);
    }

    Object.defineProperty(window, "visitors", {
        get: () => visitors,
        set: (val) => { visitors = val || {}; }
    });

    function toast(msg, type='info'){
        let t = document.createElement('div');
        t.className = `toast-msg ${type}`;
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 3000);
    }

    function loadStore(){
        try {
            let v = localStorage.getItem('vms_visitors');
            let l = localStorage.getItem('vms_logs');
            let a = localStorage.getItem('vms_audit');
            if(v) visitors = JSON.parse(v);
            if(l) {
                const loadedLogs = JSON.parse(l);
                logs.length = 0;
                logs.push(...loadedLogs);
                window.logs = logs;
            }
            if(a) auditLogs = JSON.parse(a);
        } catch(e) { toast("Gagal load data", "error"); }
    }
    
    function verifyAuditChain(){
        try {
            for(let i = 1; i < auditLogs.length; i++){
                if(auditLogs[i].hashPrev !== auditLogs[i-1].hashNow){
                    console.warn("AUDIT TAMPER DETECTED");
                    break;
                }
            }
        } catch(e) { console.warn("Audit verify error:", e); }
    }
    
    function generateReg(){ return "REG"+Date.now()+Math.floor(Math.random() * 10000); }

    async function generateSignature(payload){
        const enc = new TextEncoder().encode(payload + QR_SECRET);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    async function buildQR(reg, data){
        const ts = Date.now();
        const payload = JSON.stringify({
            reg,
            nama: data.nama,
            perusahaan: data.perusahaan,
            exp: data.expDate,
            ts: ts
        });
        const sig = await generateSignature(payload);
        return btoa(JSON.stringify({ payload, sig, ts }));
    }
    
    async function parseQR(raw){
        try{
            const decoded = JSON.parse(atob(raw));
            const expectedSig = await generateSignature(decoded.payload);
            if(decoded.sig !== expectedSig) return null;
            const payloadData = JSON.parse(decoded.payload);
            return payloadData;
        }catch(e){
            return null;
        }
    }

    // ========== QR GENERATOR HARDENED - WAIT LIBRARY + RETRY ==========
    async function waitQRCodeReady(){
        let retry = 0;
        while(typeof QRCode === "undefined" && retry < 20){
            await new Promise(r=>setTimeout(r,100));
            retry++;
        }
        return typeof QRCode !== "undefined";
    }

    async function generateQRImage(qrPayload){
        // WAIT LIBRARY READY
        const ready = await waitQRCodeReady();
        
        if(ready){
            try{
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, qrPayload, {
                    width: 200,
                    margin: 1,
                    color: { dark: '#000000', light: '#FFFFFF' }
                });
                return canvas.toDataURL("image/png");
            }catch(e){
                console.warn("Local QR failed:", e);
            }
        }
        
        // FALLBACK API + RETRY
        for(let i=0;i<2;i++){
            try{
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrPayload)}`;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                
                const result = await new Promise((resolve)=>{
                    img.onload = ()=>{
                        const canvas = document.createElement('canvas');
                        canvas.width = 200;
                        canvas.height = 200;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "white";
                        ctx.fillRect(0,0,200,200);
                        ctx.drawImage(img,0,0,200,200);
                        resolve(canvas.toDataURL("image/png"));
                    };
                    img.onerror = ()=>resolve(null);
                    img.src = qrUrl;
                    setTimeout(()=>resolve(null), 3000);
                });
                
                if(result) return result;
            } catch(e){
                console.warn("Retry QR API:", i, e);
            }
        }
        
        return null;
    }

    async function addAuditLog(reg, action, dataHash){
        try {
            const prevHash = auditLogs.length > 0 ? auditLogs[auditLogs.length - 1].hashNow : '0';
            const nowHash = await generateSignature(JSON.stringify({ reg, action, time: Date.now(), dataHash, deviceId }));
            const auditRecord = {
                id: auditLogs.length + 1,
                reg: reg,
                action: action,
                time: Date.now(),
                deviceId: deviceId,
                hashPrev: prevHash,
                hashNow: nowHash
            };
            auditLogs.push(auditRecord);
            if(auditLogs.length > 10000) auditLogs.shift();
            localStorage.setItem('vms_audit', JSON.stringify(auditLogs));
        } catch(e) { console.warn("Audit log error:", e); }
    }

    function addLog(reg, action){
        let v = visitors[reg];
        const newLog = { reg, name: v?.nama||reg, company: v?.perusahaan||'', category: v?.kategori||'UMUM', action, time: Date.now() };
        logs.unshift(newLog);
        if(logs.length>1000) logs.pop();
        window.logs = logs;
        addAuditLog(reg, action, JSON.stringify(newLog));
        if(window.saveStore) window.saveStore();
        renderLogTable();
    }

    async function ensureJsPDFReady(){
        if(window.jspdf) return true;
        return new Promise((resolve)=>{
            let max = 100;
            let i = 0;
            const interval = setInterval(()=>{
                if(window.jspdf){
                    clearInterval(interval);
                    resolve(true);
                }
                if(i++ > max){
                    clearInterval(interval);
                    resolve(false);
                }
            },100);
        });
    }

    function forceDownloadPDF(doc, filename){
        try{
            const blob = doc.output("blob");
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => {
                URL.revokeObjectURL(url);
            }, 3000);
            return true;
        }catch(err){
            console.error("FORCE DOWNLOAD ERROR:", err);
            return false;
        }
    }

    async function downloadPDFStable(reg, data){
        try{
            const ready = await ensureJsPDFReady();
            if(!ready){
                toast("PDF engine gagal dimuat. Coba refresh.", "error");
                return false;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

            let headerColor = [31,78,74];
            if(data.kategori === "VVIP") headerColor = [217,119,6];
            else if(data.kategori === "VIP") headerColor = [100,116,139];

            doc.setFillColor(...headerColor);
            doc.rect(0,0,210,40,'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(22);
            doc.text("INVITATION LETTER",105,20,{align:"center"});
            doc.setFontSize(10);
            doc.text("Corporate Access System",105,32,{align:"center"});

            doc.setTextColor(0,0,0);
            doc.setFontSize(12);
            doc.setFont(undefined,'bold');
            doc.text("VISITOR INFORMATION",20,60);
            doc.setFontSize(10);
            doc.setFont(undefined,'normal');

            let y=75;
            doc.text(`Name : ${data.nama||"-"}`,20,y); y+=8;
            doc.text(`Company : ${data.perusahaan||"-"}`,20,y); y+=8;
            doc.text(`Purpose : ${data.tujuan||"-"}`,20,y); y+=8;
            doc.text(`PIC : ${data.pic||"-"}`,20,y); y+=8;
            doc.text(`Dept : ${data.dept||"-"}`,20,y); y+=8;
            doc.text(`Validity : ${data.startDate||"-"} → ${data.expDate||"-"}`,20,y);

            if(data.foto && data.foto.startsWith('data')){
                try{ doc.addImage(data.foto,'JPEG',20,y+10,30,30); }catch(e){}
            }

            // Generate QR using hardened method
            const qrPayload = await buildQR(reg, data);
            const qrBase64 = await generateQRImage(qrPayload);
            
            // ANTI BLANK RENDER
            if(qrBase64 && qrBase64.startsWith("data:image")){
                try{
                    doc.addImage(qrBase64, 'PNG', 140, 70, 50, 50);
                }catch(e){
                    console.warn("addImage error:", e);
                    doc.setFontSize(9);
                    doc.text("QR ERROR",150,90);
                }
            }else{
                doc.setFontSize(9);
                doc.text("QR FAILED",150,90);
            }

            const success = forceDownloadPDF(doc, `INVITATION_${reg}.pdf`);
            if(!success){
                toast("Download gagal. Gunakan browser Chrome.", "error");
                return false;
            }
            toast(`PDF ${reg} berhasil didownload`, "success");
            return true;
        }catch(err){
            console.error("PDF ERROR:", err);
            toast("Terjadi error saat generate PDF", "error");
            return false;
        }
    }

    let previewData = null;
    let isDownloading = false;
    
    function showPreview(reg, data){
        previewData = { reg, data };
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        buildQR(reg, data).then(qrPayload => {
            let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(qrPayload)}`;
            modal.innerHTML = `
                <div class="modal-card">
                    <h3 style="margin-bottom:16px;">📄 Preview Invitation</h3>
                    <div style="background:#f8fafc; padding:14px; border-radius:20px; margin-bottom:16px;">
                        <p><strong>Name</strong> : ${data.nama}</p>
                        <p><strong>Company</strong> : ${data.perusahaan}</p>
                        <p><strong>Purpose</strong> : ${data.tujuan}</p>
                        <p><strong>PIC</strong> : ${data.pic}</p>
                        <p><strong>Validity</strong> : ${data.startDate} → ${data.expDate}</p>
                        <p><strong>REG</strong> : ${reg}</p>
                    </div>
                    <img class="qr-preview" src="${qrUrl}">
                    <div class="flex-btns">
                        <button id="confirmDownloadBtn">Download PDF</button>
                        <button id="closePreviewBtn" class="btn-outline">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(()=>modal.classList.add('active'),10);
            
            const confirmBtn = modal.querySelector('#confirmDownloadBtn');
            confirmBtn.onclick = async () => {

    let scannerInstance = null;
    let isScanning = false;
    let currentCameraId = null;

    async function initScanner() {
        if (scannerInstance) {
            await stopScanner();
        }
        
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras || cameras.length === 0) {
                toast("Tidak ada kamera terdeteksi", "error");
                return false;
            }
            
            const backCamera = cameras.find(cam => 
                cam.label.toLowerCase().includes('back') || 
                cam.label.toLowerCase().includes('rear') ||
                cam.label.toLowerCase().includes('belakang')
            );
            
            currentCameraId = backCamera ? backCamera.id : cameras[0].id;
            scannerInstance = new Html5Qrcode("cameraPreview");
            return true;
        } catch (err) {
            console.error("Init scanner error:", err);
            toast("Gagal inisialisasi kamera", "error");
            return false;
        }
    }

    async function startScanner() {
        if (isScanning) return;
        if (!scannerInstance) {
            const init = await initScanner();
            if (!init) return;
        }
        
        try {
            await scannerInstance.start(
                currentCameraId,
                {
                    fps: 10,
                    qrbox: { width: 280, height: 280 },
                    aspectRatio: 1.0
                },
                async (decodedText) => {
                    if (processingRegs.has(decodedText)) {
                        return;
                    }
                    
                    try {
                        await processScan(decodedText);
                        playBeep('success');
                        flashOverlay('success');
                    } catch (err) {
                        playBeep('error');
                        flashOverlay('error');
                    }
                },
                (error) => {
                    if (error && !error.includes("No MultiFormat Readers")) {
                        console.log("Scan error:", error);
                    }
                }
            );
            
            isScanning = true;
            toast("Scanner siap - unlimited scan mode", "success");
            
        } catch (err) {
            console.error("Start scanner error:", err);
            toast("Gagal start kamera: " + err.message, "error");
            isScanning = false;
        }
    }

    async function stopScanner() {
        if (scannerInstance && isScanning) {
            try {
                await scannerInstance.stop();
                await scannerInstance.clear();
            } catch (err) {
                console.error("Stop scanner error:", err);
            }
        }
        isScanning = false;
    }

    function playBeep(type) {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'success') {
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else {
                oscillator.frequency.value = 440;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
                oscillator.stop(audioContext.currentTime + 0.5);
            }
            
            setTimeout(() => audioContext.close(), 500);
        } catch (err) {
            console.log("Beep error:", err);
        }
    }

                z-index: 9999;

        overlay.style.backgroundColor = type === 'success' ? 'rgba(34, 197, 94, 0.6)' : 'rgba(239, 68, 68, 0.6)';
        overlay.style.opacity = '1';
        
        setTimeout(() => {

        }, 150);
    }

    async function processScan(qrText){
        let mode = document.getElementById('scanMode').value;
        let payload = await parseQR(qrText);
        if(!payload){ toast("QR tidak valid (bukan dari sistem ini)","error"); return; }
        
        let reg = payload.reg;
        if(processingRegs.has(reg)){
            toast("Sedang diproses, tunggu sebentar","warning");
            return;
        }
        processingRegs.add(reg);
        
        try {
            let visitor = visitors[reg];
            if(!visitor){ toast(`Visitor ${reg} tidak ditemukan`,"error"); return; }
            
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ toast("QR sudah expired","error"); return; }
            
            if(mode === "CHECK_IN"){
                if(!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
                
                visitors[reg] = {
                    ...visitor,
                    currentStatus: "IN",
                    updatedAt: Date.now(),
                    version: (visitor.version || 0) + 1,
                    deviceId: deviceId
                };
                
                addLog(reg, "CHECK_IN");
                toast(`✅ CHECK-IN ${visitor.nama} berhasil`,"success");
            } else {
                if(!visitor.sessions) visitor.sessions = [];
                let openSession = null;
                for(let i = visitor.sessions.length - 1; i >= 0; i--){
                    if(!visitor.sessions[i].checkOut){
                        openSession = visitor.sessions[i];
                        break;
                    }
                }
                
                if(!openSession){
                    toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning");
                    visitor.sessions.push({ checkIn: Date.now(), checkOut: Date.now() });
                } else {
                    openSession.checkOut = Date.now();
                }
                
                visitors[reg] = {
                    ...visitor,
                    currentStatus: "OUT",
                    updatedAt: Date.now(),
                    version: (visitor.version || 0) + 1,
                    deviceId: deviceId
                };
                
                addLog(reg, "CHECK_OUT");
                toast(`✅ CHECK-OUT ${visitor.nama} berhasil`,"success");
            }
            renderDashboard(); 
            renderLogTable();
            if(window.saveStore) window.saveStore();
        } finally {
            setTimeout(()=>processingRegs.delete(reg), 1000);
        }
    }

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "VMS_Audit_Log_Sessions");
            XLSX.writeFile(wb, `VMS_Full_Report_${Date.now()}.xlsx`);

            toast("Excel dengan riwayat sesi lengkap berhasil di export", "success");

        } catch(err){
            console.error(err);
            toast("Export gagal", "error");
        }
    };
    
    document.getElementById('backupAction').onclick = () => {
        try {
            let a = document.createElement('a'); 
            a.href = URL.createObjectURL(new Blob([JSON.stringify({visitors,logs,auditLogs})],{type:"application/json"})); 
            a.download = `vms_backup_${Date.now()}.json`; 
            a.click(); 
            toast("Backup ready","success");
        } catch(e) { toast("Backup gagal", "error"); }
    };
    document.getElementById('resetDatabaseAction').onclick = () => { 
        visitors = {}; 
        window.visitors = visitors;
        logs.length = 0;
        window.logs = logs;
        auditLogs = [];
        if(window.saveStore) window.saveStore(); 
        renderDashboard(); 
        renderLogTable(); 
        toast("Database reset","info"); 
    };
    document.getElementById('regPhotoFile').onchange = (e) => { if(e.target.files[0]){ let r=new FileReader(); r.onload=ev=>document.getElementById('previewPhotoThumb').src=ev.target.result; r.readAsDataURL(e.target.files[0]); } };

    const panes = { dashboard: document.getElementById('dashboardPane'), register: document.getElementById('registerPane'), scanner: document.getElementById('scannerPane'), logs: document.getElementById('logsPane') };
    function switchTab(tabId){
        Object.values(panes).forEach(p=>p.classList.remove('active-pane'));
        if(panes[tabId]) panes[tabId].classList.add('active-pane');
        document.querySelectorAll('.nav-item').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
        document.querySelectorAll('.mobile-nav').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
    }
    document.querySelectorAll('.nav-item, .mobile-nav').forEach(el=>{
        if(el.dataset && el.dataset.tab){
            el.addEventListener('click',()=>{ switchTab(el.dataset.tab); if(window.innerWidth<=780) document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; });
        }
    });
    document.getElementById('mobileMenuBtn').onclick = () => { document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; };
    document.getElementById('overlay').onclick = () => { document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; };
    window.addEventListener('resize',()=>{ if(window.innerWidth>780){ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; } });

    loadStore(); 
    verifyAuditChain();
    renderDashboard(); 
    renderLogTable();
    toast("🔥 ULTIMATE MODE ACTIVE - Unlimited Scan | No Nonce | No Lock | QR Hardened","success");

    window.downloadPDFStable = downloadPDFStable;
    window.logs = logs;
    window.toast = toast;
    window.processScan = processScan;
    window.addLog = addLog;
    window.renderDashboard = renderDashboard;
    window.renderLogTable = renderLogTable;
    window.buildQR = buildQR;
    window.parseQR = parseQR;
    window.generateQRImage = generateQRImage;

})();
</script>

<script>
(function(){
    if(window.__WAR_CORE_FINAL__) return;
    window.__WAR_CORE_FINAL__ = true;

    const CLOUDFLARE_WORKER_URL = "https://vmsgw.mededsapam.workers.dev";
    const SYNC_INTERVAL = 5000;
    const DB_NAME = "VMS_DB";
    let db;

    function initDB(){
        return new Promise((resolve, reject)=>{
            const req = indexedDB.open(DB_NAME, 2);
            req.onupgradeneeded = e=>{
                db = e.target.result;
                if(!db.objectStoreNames.contains("visitors")){
                    db.createObjectStore("visitors",{keyPath:"reg"});
                }
                if(!db.objectStoreNames.contains("logs")){
                    db.createObjectStore("logs",{autoIncrement:true});
                }
                if(!db.objectStoreNames.contains("audit")){
                    db.createObjectStore("audit",{autoIncrement:true});
                }
            };
            req.onsuccess = e=>{ db = e.target.result; resolve(); };
            req.onerror = (e)=>{ console.error("DB error:", e); reject(e); };
        });
    }

    async function saveOffline(reg,data){
        if(!db) await initDB();
        const tx = db.transaction("visitors","readwrite");
        tx.onerror = ()=> console.error("DB ERROR");
        tx.objectStore("visitors").put({
            reg,
            ...data,
            updatedAt: data.updatedAt || Date.now(),
            lastSync: data.lastSync || 0,
            version: data.version || 0,
            deviceId: data.deviceId || ''
        });
    }

    async function saveLogsOffline(logsData){
        if(!db) await initDB();
        const tx = db.transaction("logs","readwrite");
        tx.onerror = ()=> console.error("DB ERROR");
        const store = tx.objectStore("logs");
        store.clear();
        logsData.forEach(log => store.add(log));
    }

    async function loadOffline(){
        if(!db) await initDB();
        const visitors = await new Promise(res=>{
            const tx = db.transaction("visitors","readonly");
            const req = tx.objectStore("visitors").getAll();
            req.onsuccess = ()=>res(req.result||[]);
            req.onerror = ()=>res([]);
        });
        const logsOffline = await new Promise(res=>{
            const tx = db.transaction("logs","readonly");
            const req = tx.objectStore("logs").getAll();
            req.onsuccess = ()=>res(req.result||[]);
            req.onerror = ()=>res([]);
        });
        return { visitors, logs: logsOffline };
    }

    (async ()=>{
        await initDB();
        const offlineData = await loadOffline();
        offlineData.visitors.forEach(v=>{
            const local = window.visitors?.[v.reg];
            const localVersion = local?.version || 0;
            const cloudVersion = v.version || 0;
            
            if(!local){
                if(window.visitors) window.visitors[v.reg] = v;
            }
            else if(cloudVersion > localVersion){
                if(window.visitors) window.visitors[v.reg] = v;
            }
            else if(cloudVersion === localVersion){
                const cloudTime = v.updatedAt || 0;
                const localTime = local?.updatedAt || 0;
                if(cloudTime > localTime){
                    if(window.visitors) window.visitors[v.reg] = v;
                }
                else if(cloudTime === localTime){
                    if((v.deviceId || "") > (local?.deviceId || "")){
                        if(window.visitors) window.visitors[v.reg] = v;
                    }
                }
            }
        });
        if(offlineData.logs && offlineData.logs.length > 0 && (!window.logs || window.logs.length === 0)){
            if(window.logs){
                window.logs.length = 0;
                window.logs.push(...offlineData.logs);
            }
        }
        if(window.renderDashboard) window.renderDashboard();
        if(window.renderLogTable) window.renderLogTable();
    })();

    window.saveStore = async function(){
        if(window.saving) return;
        window.saving = true;

        try {
            try {
                localStorage.setItem('vms_visitors', JSON.stringify(window.visitors || {}));
                localStorage.setItem('vms_logs', JSON.stringify((window.logs || []).slice(0,1000)));
            } catch(e){
                if(e.name === 'QuotaExceededError'){
                    if(window.toast) window.toast("Penyimpanan penuh, hapus beberapa data lama", "error");
                } else {
                    if(window.toast) window.toast("Gagal menyimpan", "error");
                }
            }

            const visitors = window.visitors || {};
            const entries = Object.entries(visitors);

            for(const [reg,data] of entries){
                await saveOffline(reg, data);
            }
            
            if(window.logs && window.logs.length){
                await saveLogsOffline(window.logs);
            }

            if(entries.length > 0){
                const batch = entries.slice(-10);
                
                const syncPromises = batch.map(async ([reg,data]) => {
                    let success = false;
                    let retries = 0;
                    const maxRetries = 2;
                    
                    while(retries <= maxRetries && !success){
                        try{
                            const controller = new AbortController();
                            const timeoutId = setTimeout(()=>controller.abort(), 8000);
                            
                            const response = await fetch(`${CLOUDFLARE_WORKER_URL}/save`,{
                                method:"POST",
                                headers:{'Content-Type':'application/json'},
                                body: JSON.stringify({
                                    reg,
                                    ...data,
                                    updatedAt: data.updatedAt || Date.now(),
                                    version: data.version || 0,
                                    deviceId: data.deviceId || ''
                                }),
                                signal: controller.signal
                            });
                            clearTimeout(timeoutId);
                            
                            if(response.ok){
                                data.lastSync = Date.now();
                                if(window.visitors) window.visitors[reg] = data;
                                await saveOffline(reg, data);
                                success = true;
                            } else {
                                throw new Error("Response not ok");
                            }
                        } catch(e){
                            retries++;
                            if(retries > maxRetries){
                                console.warn("Cloud sync error for", reg, e);
                            } else {
                                await new Promise(r=>setTimeout(r, 1000));
                            }
                        }
                    }
                });
                
                await Promise.all(syncPromises);

                if(window.toast){
                    if(!window.__lastSyncToast || Date.now() - window.__lastSyncToast > 10000){
                        window.toast("Cloud sync aktif","success");
                        window.__lastSyncToast = Date.now();
                    }
                }
            }
        } catch(e) {
            console.error("SaveStore error:", e);
        } finally {
            window.saving = false;
        }
    };

    async function fetchCloud(){
        if(window.fetching || window.saving) return;
        window.fetching = true;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(()=>controller.abort(), 8000);
            
            const res = await fetch(`${CLOUDFLARE_WORKER_URL}/dump`, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            const json = await res.json();
            if(!json || !json.data) return;

            let changed = false;

            for (const v of json.data) {
                const local = window.visitors?.[v.reg];
                const localVersion = local?.version || 0;
                const cloudVersion = v.version || 0;
                
                if(!local){
                    if(window.visitors) window.visitors[v.reg] = v;
                    await saveOffline(v.reg, v);
                    changed = true;
                }
                else if(cloudVersion > localVersion){
                    if(window.visitors) window.visitors[v.reg] = v;
                    await saveOffline(v.reg, v);
                    changed = true;
                }
                else if(cloudVersion === localVersion){
                    const cloudTime = v.updatedAt || 0;
                    const localTime = local?.updatedAt || 0;
                    if(cloudTime > localTime){
                        if(window.visitors) window.visitors[v.reg] = v;
                        await saveOffline(v.reg, v);
                        changed = true;
                    }
                    else if(cloudTime === localTime){
                        if((v.deviceId || "") > (local?.deviceId || "")){
                            if(window.visitors) window.visitors[v.reg] = v;
                            await saveOffline(v.reg, v);
                            changed = true;
                        }
                    }
                }
            }

            if(changed){
                if(window.renderDashboard) window.renderDashboard();
                if(window.renderLogTable) window.renderLogTable();
            }

        } catch(e){
            console.log("fetchCloud error:", e);
        } finally {
            window.fetching = false;
        }
    }

    setInterval(fetchCloud, SYNC_INTERVAL);

    window.addEventListener("online", ()=>{
        if(window.toast) window.toast("Online — sync aktif","success");
        fetchCloud();
        if(window.saveStore) window.saveStore();
    });

    window.addEventListener("offline", ()=>{
        if(window.toast) window.toast("Offline mode","info");
    });

    console.log("✅ ULTIMATE MODE ACTIVE - Unlimited Scan | No Nonce | No Lock | QR Hardened");
})();
</script>

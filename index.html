<script>
// ============================================================
// HARDENED LICENSE SYSTEM - HASH BASED (NO HARDCODE)
// ============================================================
let LICENSE_MODE = localStorage.getItem("vms_license") || "DEMO";
let currentUser = null;
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let lastScanTime = {};

// ========== CLOUD CONFIGURATION ==========
const CLOUD_URL = "https://vmsgw.mededsapam.workers.dev";

function isCloudAllowed(){
    return !isDemo();
}

function isDemo(){ return LICENSE_MODE === "DEMO"; }
function isBasic(){ return LICENSE_MODE === "BASIC"; }
function isPro(){ return LICENSE_MODE === "PRO"; }

async function hashKey(key){
    const enc = new TextEncoder().encode(key);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,8);
}

// 🔥 LICENSE HASH LIST (GANTI INI)
const VALID_HASH = [
  "de9bd853",
  "b7e23ec2",
  "9f86d081"
];

async function applyLicenseKey(key){

    const hash = await hashKey(key);

    if(!VALID_HASH.includes(hash)){
        toast("License salah", "error");
        return;
    }

    LICENSE_MODE = "PRO";

    localStorage.setItem("vms_license", LICENSE_MODE);
    localStorage.setItem("vms_license_key", key);

    toast("License aktif: PRO", "success");

    applyLicenseUI();
}

function applyDemoLock(){
    if(isDemo()){
        const exportBtn = document.getElementById("exportExcelAction");
        const backupBtn = document.getElementById("backupAction");
        if(exportBtn) exportBtn.style.display = "none";
        if(backupBtn) backupBtn.style.display = "none";
    } else {
        const exportBtn = document.getElementById("exportExcelAction");
        const backupBtn = document.getElementById("backupAction");
        if(exportBtn) exportBtn.style.display = "inline-flex";
        if(backupBtn) backupBtn.style.display = "inline-flex";
    }
}

function getUsers(){
    return JSON.parse(localStorage.getItem("vms_users") || '[{"username":"admin","password":"8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918","role":"SUPER_ADMIN"}]');
}

async function hashPassword(pw){
    const enc = new TextEncoder().encode(pw);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login(username, password){
    if(!isPro()) return false;
    let users = getUsers();
    let hash = await hashPassword(password);
    let u = users.find(x => x.username === username && x.password === hash);
    if(u){
        currentUser = u;
        localStorage.setItem("vms_user", JSON.stringify(u));
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appLayout").style.display = "flex";
        updateUserUI();
        applyRoleVisibility();
        toast(`Welcome ${currentUser.username} (${currentUser.role})`, "success");
        if(window.renderDashboard) window.renderDashboard();
        return true;
    }
    toast("Login gagal", "error");
    return false;
}

function logout(){
    currentUser = null;
    localStorage.removeItem("vms_user");
    if(isPro()){
        document.getElementById("appLayout").style.display = "none";
        document.getElementById("loginOverlay").style.display = "flex";
    } else {
        document.getElementById("appLayout").style.display = "flex";
    }
    toast("Logged out", "info");
}

function loadUserSession(){
    if(!isPro()){
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appLayout").style.display = "flex";
        currentUser = { username: "demo", role: "OPERATOR" };
        updateUserUI();
        applyRoleVisibility();
        return true;
    }
    let u = localStorage.getItem("vms_user");
    if(u){
        currentUser = JSON.parse(u);
        if(currentUser){
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appLayout").style.display = "flex";
            updateUserUI();
            applyRoleVisibility();
            return true;
        }
    }
    document.getElementById("loginOverlay").style.display = "flex";
    document.getElementById("appLayout").style.display = "none";
    return false;
}

function isAdmin() { return currentUser?.role === "SUPER_ADMIN" && isPro(); }

function applyRoleVisibility() {
    const adminOnly = document.querySelectorAll(".admin-only");
    adminOnly.forEach(el => {
        if(isAdmin()) el.classList.remove("admin-hide");
        else el.classList.add("admin-hide");
    });
}

function updateUserUI(){
    const userSpan = document.querySelectorAll("#userInfoTop, #userInfoSidebar");
    userSpan.forEach(el => { if(el) el.innerHTML = `👤 ${currentUser?.username} (${currentUser?.role || "DEMO"})`; });
}

function setSite(site){
    SITE_ID = site;
    localStorage.setItem("vms_site", site);
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(sel => { if(sel) sel.value = site; });
    toast(`Site aktif: ${SITE_ID}`, "info");
    if(window.renderDashboard) window.renderDashboard();
    if(window.renderLogTable) window.renderLogTable();
}

function applyLicenseUI(){
    const loginOverlay = document.getElementById("loginOverlay");
    const appLayout = document.getElementById("appLayout");
    const adminOnly = document.querySelectorAll(".admin-only");
    if(isPro()){
        if(loginOverlay) loginOverlay.style.display = "flex";
        if(appLayout) appLayout.style.display = "none";
        adminOnly.forEach(el => el.style.display = "inline-flex");
    } else {
        if(loginOverlay) loginOverlay.style.display = "none";
        if(appLayout) appLayout.style.display = "flex";
        adminOnly.forEach(el => el.style.display = "none");
    }
    const badge = document.getElementById("licenseStatusBadge");
    if(badge) badge.innerText = LICENSE_MODE + " MODE";
    applyDemoLock();
}

function checkDemoLimit(){
    if(isDemo()){
        if(window.visitors && Object.keys(window.visitors).length >= 10){
            toast("⚠️ Demo limit: maksimal 10 visitor. Upgrade license untuk unlimited.", "warning");
            return false;
        }
    }
    return true;
}

// ============================================================
// SECURE STORAGE WITH SIGNATURE (ANTI TAMPER)
// ============================================================
let visitors = {};
let logs = [];
let auditLogs = [];

async function signData(data){
    const enc = new TextEncoder().encode(JSON.stringify(data) + "VMS_LOCK_v2");
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function secureSave(){
    try {
        const payload = { visitors, logs, auditLogs };
        const sig = await signData(payload);
        localStorage.setItem("vms_secure", JSON.stringify({ payload, sig }));
        localStorage.setItem("vms_visitors_backup", JSON.stringify(visitors));
    } catch(e) { console.warn("Save error:", e); }
}

async function secureLoad(){
    try {
        let raw = localStorage.getItem("vms_secure");
        if(!raw) {
            let v = localStorage.getItem("vms_visitors_backup");
            if(v) visitors = JSON.parse(v);
            return;
        }
        let parsed = JSON.parse(raw);
        let check = await signData(parsed.payload);
        if(check === parsed.sig){
            visitors = parsed.payload.visitors || {};
            logs = parsed.payload.logs || [];
            auditLogs = parsed.payload.auditLogs || [];
        } else {
            console.warn("Data tamper detected! Resetting...");
            visitors = {};
            logs = [];
            auditLogs = [];
        }
    } catch(e) { console.warn("Load error:", e); }
}

window.saveStore = secureSave;

// ============================================================
// GLOBAL ERROR HANDLER
// ============================================================
window.onerror = function(msg, url, line, col, error) {
    console.error('GLOBAL ERROR:', msg, error);
    return true;
};
window.onunhandledrejection = function(e) {
    console.error('UNHANDLED REJECTION:', e.reason);
    e.preventDefault();
    return true;
};

// ============================================================
// VMS ULTIMATE MODE - UNLIMITED SCAN | NO NONCE | NO STATUS LOCK
// ============================================================
(async function(){
    const QR_SECRET = "VmsEnt2026!";
    let processingRegs = new Set();
    let isManualProcessing = false;
    
    let deviceId = localStorage.getItem('vms_device_id');
    if(!deviceId){
        deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('vms_device_id', deviceId);
    }

    Object.defineProperty(window, "visitors", {
        get: () => visitors,
        set: (val) => { visitors = val || {}; secureSave(); }
    });
    window.logs = logs;

    function toast(msg, type='info'){
        let t = document.createElement('div');
        t.className = `toast-msg ${type}`;
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 3000);
    }
    window.toast = toast;

    await secureLoad();
    
    function generateReg(){ return "REG"+Date.now()+Math.floor(Math.random() * 10000); }

    async function generateSignature(payload){
        const enc = new TextEncoder().encode(payload + QR_SECRET);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    async function buildQR(reg, data){
        const ts = Date.now();
        const payload = JSON.stringify({
            reg: reg,
            nama: data.nama,
            perusahaan: data.perusahaan,
            exp: data.expDate,
            ts: ts
        });
        const sig = await generateSignature(payload);
        return btoa(JSON.stringify({ payload, sig, ts }));
    }
    
    async function parseQR(raw){
        try{
            const decoded = JSON.parse(atob(raw));
            const expectedSig = await generateSignature(decoded.payload);
            if(decoded.sig !== expectedSig) return null;
            const payloadData = JSON.parse(decoded.payload);
            return payloadData;
        }catch(e){
            return null;
        }
    }

    async function waitQRCodeReady(){
        let retry = 0;
        while(typeof QRCode === "undefined" && retry < 20){
            await new Promise(r=>setTimeout(r,100));
            retry++;
        }
        return typeof QRCode !== "undefined";
    }

    async function generateQRImage(qrPayload){
        const ready = await waitQRCodeReady();
        if(ready){
            try{
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, qrPayload, {
                    width: 200,
                    margin: 1,
                    color: { dark: '#000000', light: '#FFFFFF' }
                });
                return canvas.toDataURL("image/png");
            }catch(e){ console.warn("Local QR failed:", e); }
        }
        for(let i=0;i<2;i++){
            try{
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrPayload)}`;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                const result = await new Promise((resolve)=>{
                    img.onload = ()=>{
                        const canvas = document.createElement('canvas');
                        canvas.width = 200;
                        canvas.height = 200;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "white";
                        ctx.fillRect(0,0,200,200);
                        ctx.drawImage(img,0,0,200,200);
                        resolve(canvas.toDataURL("image/png"));
                    };
                    img.onerror = ()=>resolve(null);
                    img.src = qrUrl;
                    setTimeout(()=>resolve(null), 3000);
                });
                if(result) return result;
            } catch(e){ console.warn("Retry QR API:", i, e); }
        }
        return null;
    }

    function addLog(regRaw, action){
        // regRaw is the original reg without site prefix
        let siteKey = SITE_ID + "_" + regRaw;
        let v = visitors[siteKey];
        const newLog = { reg: regRaw, name: v?.nama||regRaw, company: v?.perusahaan||'', category: v?.kategori||'UMUM', action, time: Date.now(), site: SITE_ID };
        logs.unshift(newLog);
        if(logs.length>1000) logs.pop();
        window.logs = logs;
        secureSave();
        renderLogTable();
    }

    async function ensureJsPDFReady(){
        if(window.jspdf) return true;
        return new Promise((resolve)=>{
            let max = 100;
            let i = 0;
            const interval = setInterval(()=>{
                if(window.jspdf){
                    clearInterval(interval);
                    resolve(true);
                }
                if(i++ > max){
                    clearInterval(interval);
                    resolve(false);
                }
            },100);
        });
    }

    function forceDownloadPDF(doc, filename){
        try{
            const blob = doc.output("blob");
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => { URL.revokeObjectURL(url); }, 3000);
            return true;
        }catch(err){ console.error("FORCE DOWNLOAD ERROR:", err); return false; }
    }

    async function downloadPDFStable(reg, data){
        try{
            const ready = await ensureJsPDFReady();
            if(!ready){ toast("PDF engine gagal dimuat. Coba refresh.", "error"); return false; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
            let headerColor = [31,78,74];
            if(data.kategori === "VVIP") headerColor = [217,119,6];
            else if(data.kategori === "VIP") headerColor = [100,116,139];
            doc.setFillColor(...headerColor);
            doc.rect(0,0,210,40,'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(22);
            doc.text("INVITATION LETTER",105,20,{align:"center"});
            doc.setFontSize(10);
            doc.text("Corporate Access System",105,32,{align:"center"});
            doc.setTextColor(0,0,0);
            doc.setFontSize(12);
            doc.setFont(undefined,'bold');
            doc.text("VISITOR INFORMATION",20,60);
            doc.setFontSize(10);
            doc.setFont(undefined,'normal');
            let y=75;
            doc.text(`Name : ${data.nama||"-"}`,20,y); y+=8;
            doc.text(`Company : ${data.perusahaan||"-"}`,20,y); y+=8;
            doc.text(`Purpose : ${data.tujuan||"-"}`,20,y); y+=8;
            doc.text(`PIC : ${data.pic||"-"}`,20,y); y+=8;
            doc.text(`Dept : ${data.dept||"-"}`,20,y); y+=8;
            doc.text(`Validity : ${data.startDate||"-"} → ${data.expDate||"-"}`,20,y);
            if(data.foto && data.foto.startsWith('data')){ try{ doc.addImage(data.foto,'JPEG',20,y+10,30,30); }catch(e){} }
            const qrPayload = await buildQR(reg, data);
            const qrBase64 = await generateQRImage(qrPayload);
            if(qrBase64 && qrBase64.startsWith("data:image")){ try{ doc.addImage(qrBase64, 'PNG', 140, 70, 50, 50); }catch(e){ doc.setFontSize(9); doc.text("QR ERROR",150,90); } }
            else{ doc.setFontSize(9); doc.text("QR FAILED",150,90); }
            const success = forceDownloadPDF(doc, `INVITATION_${reg}.pdf`);
            if(!success){ toast("Download gagal. Gunakan browser Chrome.", "error"); return false; }
            toast(`PDF ${reg} berhasil didownload`, "success");
            return true;
        }catch(err){ console.error("PDF ERROR:", err); toast("Terjadi error saat generate PDF", "error"); return false; }
    }

    let previewData = null;
    let isDownloading = false;
    
    function showPreview(reg, data){
        previewData = { reg, data };
        let modal = document.createElement('div');
        modal.className = 'modal-overlay';
        buildQR(reg, data).then(async qrPayload => {
            const qrBase64 = await generateQRImage(qrPayload);
            modal.innerHTML = `
                <div class="modal-card">
                    <h3 style="margin-bottom:16px;">📄 Preview Invitation</h3>
                    <div style="background:#f8fafc; padding:14px; border-radius:20px; margin-bottom:16px;">
                        <p><strong>Name</strong> : ${data.nama}</p>
                        <p><strong>Company</strong> : ${data.perusahaan}</p>
                        <p><strong>Purpose</strong> : ${data.tujuan}</p>
                        <p><strong>PIC</strong> : ${data.pic}</p>
                        <p><strong>Validity</strong> : ${data.startDate} → ${data.expDate}</p>
                        <p><strong>REG</strong> : ${reg}</p>
                    </div>
                    ${qrBase64 ? `<img class="qr-preview" src="${qrBase64}">` : '<div style="color:red; text-align:center;">QR gagal dimuat</div>'}
                    <div class="flex-btns">
                        <button id="confirmDownloadBtn">Download PDF</button>
                        <button id="closePreviewBtn" class="btn-outline">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(()=>modal.classList.add('active'),10);
            const confirmBtn = modal.querySelector('#confirmDownloadBtn');
            confirmBtn.onclick = async () => {
                if(isDownloading) return;
                isDownloading = true;
                const originalText = confirmBtn.innerText;
                confirmBtn.innerHTML = `Processing <span class="loader"></span>`;
                confirmBtn.disabled = true;
                if(previewData) await downloadPDFStable(previewData.reg, previewData.data);
                confirmBtn.innerHTML = originalText;
                confirmBtn.disabled = false;
                isDownloading = false;
                modal.remove();
            };
            modal.querySelector('#closePreviewBtn').onclick = () => modal.remove();
        });
    }

    document.getElementById('generateQRBtn').onclick = async () => {
        if(!checkDemoLimit()) return;
        let nama = document.getElementById('regName').value;
        let perusahaan = document.getElementById('regCompany').value;
        let kategori = document.getElementById('regCategory').value;
        let tujuan = document.getElementById('regPurpose').value;
        let custom = document.getElementById('regCustomPurpose').value;
        if(tujuan === "Lainnya") tujuan = custom || "Custom";
        let pic = document.getElementById('regPic').value;
        let dept = document.getElementById('regDept').value;
        let startDate = document.getElementById('regStartDate').value || new Date().toISOString().slice(0,10);
        let expDate = document.getElementById('regExpDate').value;
        if(!nama || !perusahaan || !pic || !dept || !expDate){ toast("Lengkapi semua field wajib","error"); return; }
        let reg = generateReg();
        let foto = "";
        let file = document.getElementById('regPhotoFile').files[0];
        if(file){ 
            let reader = await new Promise(r=>{let fr=new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(file);});
            let img = new Image();
            img.src = reader;
            await new Promise(r => img.onload = r);
            let canvas = document.createElement("canvas");
            let maxWidth = 400;
            let scale = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            let ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            foto = canvas.toDataURL("image/jpeg", 0.4);
        }
        let data = { nama, perusahaan, kategori, tujuan, pic, dept, startDate, expDate, foto, sessions:[], currentStatus:"OUT", updatedAt: Date.now(), version: 1, deviceId: deviceId, site: SITE_ID };
        // FIX: Use site-prefixed key for storage
        let siteKey = SITE_ID + "_" + reg;
        visitors[siteKey] = data;
        addLog(reg, "REGISTER");
        toast(`✅ ${nama} terdaftar (${reg})`,"success");
        showPreview(reg, data);
        document.getElementById('regName').value = ""; 
        document.getElementById('regCompany').value = ""; 
        document.getElementById('regPic').value = ""; 
        document.getElementById('regDept').value = ""; 
        document.getElementById('regPhotoFile').value = ""; 
        document.getElementById('previewPhotoThumb').src = "";
        renderDashboard(); 
        renderLogTable();
        secureSave();
    };

    async function capturePhoto(){
        return new Promise(async(resolve)=>{
            let modalDiv = document.createElement('div');
            modalDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:4000;display:flex;align-items:center;justify-content:center;';
            modalDiv.innerHTML = `<div style="background:white;border-radius:32px;padding:20px;width:90%;max-width:400px;"><video id="camVideoWalk" autoplay playsinline style="width:100%;border-radius:16px;"></video><canvas id="canvasWalk" style="display:none;"></canvas><div style="display:flex;gap:12px;margin-top:16px;"><button id="takeWalkBtn">Ambil Foto</button><button id="closeWalkBtn">Batal</button></div></div>`;
            document.body.appendChild(modalDiv);
            let video = modalDiv.querySelector('#camVideoWalk');
            let stream = await navigator.mediaDevices.getUserMedia({video:true});
            video.srcObject = stream; 
            await video.play();
            modalDiv.querySelector('#takeWalkBtn').onclick = () => {
                let canvas = modalDiv.querySelector('#canvasWalk');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video,0,0);
                canvas.toBlob(blob=>{ 
                    stream.getTracks().forEach(t=>t.stop()); 
                    modalDiv.remove(); 
                    resolve(new File([blob],'walkin.jpg',{type:'image/jpeg'})); 
                },'image/jpeg',0.8);
            };
            modalDiv.querySelector('#closeWalkBtn').onclick = () => { 
                stream.getTracks().forEach(t=>t.stop()); 
                modalDiv.remove(); 
                resolve(null); 
            };
        });
    }

    let scannerInstance = null;
    let isScanning = false;
    let currentCameraId = null;

    async function initScanner() {
        if (scannerInstance) { await stopScanner(); }
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras || cameras.length === 0) { toast("Tidak ada kamera terdeteksi", "error"); return false; }
            const backCamera = cameras.find(cam => cam.label.toLowerCase().includes('back') || cam.label.toLowerCase().includes('rear') || cam.label.toLowerCase().includes('belakang'));
            currentCameraId = backCamera ? backCamera.id : cameras[0].id;
            scannerInstance = new Html5Qrcode("cameraPreview");
            return true;
        } catch (err) { console.error("Init scanner error:", err); toast("Gagal inisialisasi kamera", "error"); return false; }
    }

    async function startScanner() {
        if (isScanning) return;
        if (!scannerInstance) { const init = await initScanner(); if (!init) return; }
        try {
            await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
                async (decodedText) => {
                    if (processingRegs.has(decodedText)) { return; }
                    try { await processScan(decodedText); } catch (err) {}
                },
                (error) => { if (error && !error.includes("No MultiFormat Readers")) { console.log("Scan error:", error); } }
            );
            isScanning = true;
            toast("Scanner siap - unlimited scan mode", "success");
        } catch (err) { console.error("Start scanner error:", err); toast("Gagal start kamera: " + err.message, "error"); isScanning = false; }
    }

    async function stopScanner() {
        if (scannerInstance && isScanning) { try { await scannerInstance.stop(); await scannerInstance.clear(); } catch (err) { console.error("Stop scanner error:", err); } }
        isScanning = false;
    }

    async function cleanupScanner() {
        if (scannerInstance) { try { await scannerInstance.stop().catch(()=>{}); await scannerInstance.clear().catch(()=>{}); } catch (e) {} scannerInstance = null; }
        isScanning = false;
        const container = document.getElementById("cameraPreview");
        if(container) container.innerHTML = "";
    }

    document.getElementById('startCamBtn').onclick = async () => { const container = document.getElementById('cameraPreview'); container.innerHTML = ''; await stopScanner(); await cleanupScanner(); await startScanner(); };
    document.getElementById('stopCamBtn').onclick = async () => { await stopScanner(); await cleanupScanner(); toast("Kamera berhenti", "info"); };
    
    document.getElementById('uploadQrBtn').onclick = () => document.getElementById('uploadQrFile').click();
    document.getElementById('uploadQrFile').onchange = async (e) => {
        let file = e.target.files[0];
        if(!file) return;
        try {
            if(!window.Html5Qrcode){ toast("QR engine belum siap", "error"); return; }
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.src = url;
            await img.decode();
            URL.revokeObjectURL(url);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            const scanner = new Html5Qrcode("temp-reader");
            const decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
            await processScan(decoded);
            await scanner.clear();
            document.getElementById("temp-reader").innerHTML = "";
        } catch(err){ console.error(err); toast("QR tidak terbaca / file tidak valid", "error"); }
    };
    
    async function processScan(qrText){
        let mode = document.getElementById('scanMode').value;
        let payload = await parseQR(qrText);
        if(!payload){ toast("QR tidak valid (bukan dari sistem ini)","error"); return; }
        let reg = payload.reg;
        
        if(lastScanTime[reg] && Date.now() - lastScanTime[reg] < 1000){
            toast("Scan terlalu cepat","warning");
            return;
        }
        lastScanTime[reg] = Date.now();
        
        if(processingRegs.has(reg)){ toast("Sedang diproses, tunggu sebentar","warning"); return; }
        processingRegs.add(reg);
        try {
            let siteKey = SITE_ID + "_" + reg;
            let visitor = visitors[siteKey];
            if(!visitor){ toast(`Visitor ${reg} tidak ditemukan`,"error"); return; }
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ toast("QR sudah expired","error"); return; }
            if(mode === "CHECK_IN"){
                if(!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
                visitors[siteKey] = { ...visitor, currentStatus: "IN", updatedAt: Date.now(), version: (visitor.version || 0) + 1, deviceId: deviceId, site: SITE_ID };
                addLog(reg, "CHECK_IN");
                toast(`✅ CHECK-IN ${visitor.nama} berhasil`,"success");
            } else {
                if(!visitor.sessions) visitor.sessions = [];
                let openSession = null;
                for(let i = visitor.sessions.length - 1; i >= 0; i--){ if(!visitor.sessions[i].checkOut){ openSession = visitor.sessions[i]; break; } }
                if(!openSession){ toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning"); visitor.sessions.push({ checkIn: Date.now(), checkOut: Date.now() }); }
                else { openSession.checkOut = Date.now(); }
                visitors[siteKey] = { ...visitor, currentStatus: "OUT", updatedAt: Date.now(), version: (visitor.version || 0) + 1, deviceId: deviceId, site: SITE_ID };
                addLog(reg, "CHECK_OUT");
                toast(`✅ CHECK-OUT ${visitor.nama} berhasil`,"success");
            }
            renderDashboard(); 
            renderLogTable();
            secureSave();
        } finally { setTimeout(()=>processingRegs.delete(reg), 1000); }
    }

        try {

            if(exp < new Date()){ toast("QR sudah expired","error"); return; }

                if(!visitor.sessions) visitor.sessions = [];

                toast(`Check-in ${visitor.nama} success`,"success");

                if(!openSession){ toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning"); visitor.sessions.push({ checkIn: Date.now(), checkOut: Date.now() }); }
                else { openSession.checkOut = Date.now(); }
                visitors[siteKey] = { ...visitor, currentStatus: "OUT", updatedAt: Date.now(), version: (visitor.version || 0) + 1, deviceId: deviceId, site: SITE_ID };
                addLog(reg, "CHECK_OUT");
                toast(`Check-out ${visitor.nama} success`,"success");

    };

    function renderDashboard(){
        try {
            let v = Object.values(visitors);
            let active = v.filter(x=>x.currentStatus==="IN").length;
            let today = new Date().toDateString();
            let todayCheck = logs.filter(l=> new Date(l.time).toDateString()===today && l.action==="CHECK_IN").length;
            document.getElementById('statsWidget').innerHTML = `
                <div class="stat-card"><h4>Total Visitors</h4><div class="stat-number">${v.length}</div></div>
                <div class="stat-card"><h4>Active Inside</h4><div class="stat-number">${active}</div></div>
                <div class="stat-card"><h4>Check-ins Today</h4><div class="stat-number">${todayCheck}</div></div>
            `;
            let last7 = [...Array(7)].map((_,i)=>{let d=new Date(); d.setDate(d.getDate()-i); return d.toLocaleDateString('id',{weekday:'short'});}).reverse();
            let trend = last7.map((_,i)=>{let d=new Date(); d.setDate(d.getDate()-(6-i)); return logs.filter(l=>new Date(l.time).toDateString()===d.toDateString() && l.action==="CHECK_IN").length;});
            const trendCanvas = document.getElementById('trendChart');
            const categoryCanvas = document.getElementById('categoryChart');
            if(window.Chart && trendCanvas && categoryCanvas) {
                if(window.lineChart) window.lineChart.destroy();
                window.lineChart = new Chart(trendCanvas, { type:'line', data:{ labels:last7, datasets:[{ label:'Visit trend', data:trend, borderColor:'#1f4e4a', fill:false }] } });
                let catCount = { VVIP:0, VIP:0, UMUM:0 };
                v.forEach(x=>{ if(x.kategori) catCount[x.kategori]++; });
                if(window.pieChart) window.pieChart.destroy();
                window.pieChart = new Chart(categoryCanvas, { type:'pie', data:{ labels:['VVIP','VIP','UMUM'], datasets:[{ data:[catCount.VVIP,catCount.VIP,catCount.UMUM], backgroundColor:['#fbbf24','#94a3b8','#1f4e4a'] }] } });
            } else { if(trendCanvas) trendCanvas.style.display = 'none'; if(categoryCanvas) categoryCanvas.style.display = 'none'; }
        } catch(e) { console.error("Render dashboard error:", e); }
    }
    
    function renderLogTable(){
        try {
            let search = document.getElementById('searchLog')?.value.toLowerCase() || '';

                    visitor.sessions.forEach((session, idx) => {
                        const checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                        const checkOutDate = session.checkOut ? new Date(session.checkOut) : null;
                        const formatDateTime = (date) => { if(!date) return "-"; const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); const h = String(date.getHours()).padStart(2, '0'); const mi = String(date.getMinutes()).padStart(2, '0'); const s = String(date.getSeconds()).padStart(2, '0'); return `${y}-${m}-${d} ${h}:${mi}:${s}`; };
                        let durationText = "-"; let statusText = "IN PROGRESS";
                        if (session.checkIn && session.checkOut) { const durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000); durationText = durationMinutes.toString(); statusText = "COMPLETED"; }
                        else if (session.checkIn && !session.checkOut) { durationText = "IN PROGRESS"; statusText = "IN PROGRESS"; }
                        dataForExcel.push({ "Nama": visitor.nama, "No. Registrasi": reg, "Perusahaan": visitor.perusahaan, "Kategori": visitor.kategori, "Tujuan": visitor.tujuan, "PIC": visitor.pic, "Departemen": visitor.dept, "Sesi Ke": idx + 1, "Check-In": formatDateTime(checkInDate), "Check-Out": formatDateTime(checkOutDate), "Durasi (menit)": durationText, "Status": statusText, "Masa Berlaku": visitor.expDate || "-" });
                    });
                } else { dataForExcel.push({ "Nama": visitor.nama, "No. Registrasi": reg, "Perusahaan": visitor.perusahaan, "Kategori": visitor.kategori, "Tujuan": visitor.tujuan, "PIC": visitor.pic, "Departemen": visitor.dept, "Sesi Ke": "-", "Check-In": "-", "Check-Out": "-", "Durasi (menit)": "-", "Status": "TERDAFTAR (Belum ada aktivitas)", "Masa Berlaku": visitor.expDate || "-" }); }
            });
            const ws = XLSX.utils.json_to_sheet(dataForExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "VMS_Audit_Log_Sessions");
            XLSX.writeFile(wb, `VMS_Full_Report_${Date.now()}.xlsx`);
            toast("Excel berhasil di export", "success");
        } catch(err){ console.error(err); toast("Export gagal", "error"); }
    };
    
    document.getElementById('backupAction').onclick = () => {
        try { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({visitors,logs,auditLogs})],{type:"application/json"})); a.download = `vms_backup_${Date.now()}.json`; a.click(); toast("Backup ready","success"); }
        catch(e) { toast("Backup gagal", "error"); }
    };
    document.getElementById('resetDatabaseAction').onclick = () => { 
        if(!isAdmin()) return;
        visitors = {}; 
        window.visitors = visitors;
        logs.length = 0;
        window.logs = logs;
        auditLogs = [];
        secureSave(); 
        renderDashboard(); 
        renderLogTable(); 
        toast("Database reset","info"); 
    };
    document.getElementById('regPhotoFile').onchange = (e) => { if(e.target.files[0]){ let r=new FileReader(); r.onload=ev=>document.getElementById('previewPhotoThumb').src=ev.target.result; r.readAsDataURL(e.target.files[0]); } };

    const panes = { dashboard: document.getElementById('dashboardPane'), register: document.getElementById('registerPane'), scanner: document.getElementById('scannerPane'), logs: document.getElementById('logsPane') };
    function switchTab(tabId){
        Object.values(panes).forEach(p=>p.classList.remove('active-pane'));
        if(panes[tabId]) panes[tabId].classList.add('active-pane');
        document.querySelectorAll('.nav-item').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
        document.querySelectorAll('.mobile-nav').forEach(nav=>{ if(nav.dataset.tab === tabId) nav.classList.add('active'); else nav.classList.remove('active'); });
    }
    document.querySelectorAll('.nav-item, .mobile-nav').forEach(el=>{
        if(el.dataset && el.dataset.tab){
            el.addEventListener('click',()=>{ switchTab(el.dataset.tab); if(window.innerWidth<=780) document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; });
        }
    });
    document.getElementById('mobileMenuBtn').onclick = () => { document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; };
    document.getElementById('overlay').onclick = () => { document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; };
    window.addEventListener('resize',()=>{ if(window.innerWidth>780){ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; } });
    
    document.getElementById('submitLicenseBtn').onclick = () => {
        let input = document.getElementById("licenseInput");
        if(input) applyLicenseKey(input.value);
        input.value = "";
    };
    document.getElementById('doLoginBtn').onclick = () => {
        let u = document.getElementById('loginUsername').value;
        let p = document.getElementById('loginPassword').value;
        login(u, p);
    };
    document.getElementById('logoutBtnTop').onclick = logout;
    document.getElementById('logoutBtnSidebar').onclick = logout;
    document.getElementById('siteSelector').onchange = (e) => setSite(e.target.value);
    document.getElementById('siteSelectorTop').onchange = (e) => setSite(e.target.value);

    renderDashboard(); 
    renderLogTable();
    loadUserSession();
    setSite(SITE_ID);
    applyLicenseUI();
    lockLicense();

    window.downloadPDFStable = downloadPDFStable;
    window.logs = logs;
    window.toast = toast;
    window.processScan = processScan;
    window.addLog = addLog;
    window.renderDashboard = renderDashboard;
    window.renderLogTable = renderLogTable;
    window.buildQR = buildQR;
    window.parseQR = parseQR;
    window.generateQRImage = generateQRImage;
    
    window.addEventListener("beforeunload", () => secureSave());
    
    toast("🔥 HYBRID SYSTEM ACTIVE - License: " + LICENSE_MODE + " | QR Unlimited | Multi-Site Safe","success");
})();
</script>

<!-- 🔥 SUPER SYNC PATCH FINAL (INJECTED CLEAN) -->
<script>
(function(){

if(window.__VMS_SUPER_PATCH__) return;
window.__VMS_SUPER_PATCH__ = true;

// ================== STATE ==================
let retryQueue = [];
let isSyncing = false;
let syncTimer = null;
let lastSyncTime = 0;
let lastPayloadHash = "";
let isBeaconSending = false;

const MAX_QUEUE = 20;
const CLOUD_URL = "https://vmsgw.mededsapam.workers.dev";

// ================== HASH ==================
function hashPayload(p){
    return (
        Object.entries(p.visitors || {})
            .sort(([a],[b]) => a.localeCompare(b))
            .map(([k, v]) => k + "_" + (v.updatedAt || 0))
            .join("|")
        +
        "_"
        +
        (p.logs || [])
            .map(l => l.time + "_" + (l.reg||"") + "_" + (l.action||""))
            .sort()
            .join("|")
    );
}

// ================== BUILD PAYLOAD ==================
function buildPayload(){
    const now = Date.now();

    const deltaVisitors = {};
    Object.entries(window.visitors || {}).forEach(([k, v]) => {
        if((v.updatedAt || 0) > lastSyncTime){
            deltaVisitors[k] = v;
        }
    });

    const deltaLogs = (window.logs || [])
        .filter(l => (l.time || 0) > lastSyncTime)
        .slice(0, 100);

    return {
        visitors: deltaVisitors,
        logs: deltaLogs,
        deviceId: localStorage.getItem('vms_device_id') || 'unknown',
        site: localStorage.getItem('vms_site') || 'SITE_A',
        ts: now
    };
}

// ================== SAFE SYNC ==================
async function saveToCloudSafe(payload){

    if(
    !payload ||
    (
        (!payload.visitors || Object.keys(payload.visitors).length === 0) &&
        (!payload.logs || payload.logs.length === 0)
    )
){
    return;
}

    const hash = hashPayload(payload);

    if(hash === lastPayloadHash && lastSyncTime > 0){
        return;
    }

    if(isSyncing || !navigator.onLine) return;

    isSyncing = true;

    try{
        const res = await fetch(CLOUD_URL + "/save",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(payload)
        });

        if(res.ok){
            lastSyncTime = payload.ts || Date.now();
            lastPayloadHash = hash;

            if(retryQueue.length && retryQueue[0]?.payload?.ts === payload.ts){
                retryQueue.shift();
            }
        }else{
            throw new Error("Bad response");
        }

    }catch(e){

        const exists = retryQueue.find(i => i.payload?.ts === payload.ts);

        if(!exists){
            if(retryQueue.length >= MAX_QUEUE){
                retryQueue.shift();
            }

            retryQueue.push({
                payload,
                time: Date.now(),
                retry: 0
            });
        }

    } finally {
        isSyncing = false;
    }
}

// ================== RETRY ==================
setInterval(async ()=>{

    if(!navigator.onLine || !retryQueue.length) return;

    const item = retryQueue[0];

    if(item.retry >= 5){
        retryQueue.shift();
        return;
    }

    const backoff = Math.min(3000 * Math.pow(2, item.retry), 30000);

    if(Date.now() - item.time < backoff) return;

    await saveToCloudSafe(item.payload);

    if(retryQueue.length && retryQueue[0] === item){
        item.retry++;
        item.time = Date.now();
    }

}, 3000);

// ================== SMART SYNC ==================
function smartSync(type="normal"){
    clearTimeout(syncTimer);

    const delay = type === "scan" ? 300 : 1000;

    syncTimer = setTimeout(()=>{
        saveToCloudSafe(buildPayload());
    }, delay);
}

// ================== OVERRIDE ==================
window.saveToCloud = function(){
    smartSync();
};

window.smartSync = smartSync;

// ================== HOOK ==================
if(window.addLog){
    const old = window.addLog;
    window.addLog = function(){
        const r = old.apply(this, arguments);
        smartSync("scan");
        return r;
    };
}

if(window.processScan){
    const old = window.processScan;
    window.processScan = async function(){
        const r = await old.apply(this, arguments);
        smartSync("scan");
        return r;
    };
}

// ================== ONLINE ==================
window.addEventListener("online", ()=>{
    smartSync();
});

// ================== CLOSE APP ==================
window.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState === "hidden"){
        if(isBeaconSending) return;
        isBeaconSending = true;

        try{
            const payload = buildPayload();
            navigator.sendBeacon(CLOUD_URL + "/save", JSON.stringify(payload));
        }catch(e){
            console.warn("Beacon error:", e);
        } finally {
            setTimeout(()=> isBeaconSending=false, 1000);
        }
    }
});

// ================== INIT ==================
window.addEventListener("load", ()=>{
    smartSync();
});

console.log("🔥 SUPER PATCH ACTIVE (CLEAN INJECT)");

})();
</script>

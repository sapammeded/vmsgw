<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>VMS WAR COMMAND CENTER | Hybrid Command Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #020617;
    color: white;
}

/* ================= HYBRID LAYOUT ================= */
.container {
    padding: 12px;
    max-width: 1400px;
    margin: 0 auto;
}

/* HEADER HYBRID */
.hybrid-header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    border: 1px solid #334155;
}

.logo-area h2 {
    font-size: 1.2rem;
    color: #22c55e;
}

.logo-area p {
    font-size: 0.7rem;
    color: #94a3b8;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.user-badge {
    background: #1e293b;
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 0.8rem;
    border: 1px solid #334155;
}

/* STATS GRID HYBRID */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
}

.stat-card-hybrid {
    background: #0f172a;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    border: 1px solid #1e293b;
}

.stat-number {
    font-size: 1.8rem;
    font-weight: bold;
    color: #22c55e;
}

.stat-label {
    font-size: 0.7rem;
    color: #94a3b8;
    text-transform: uppercase;
    margin-top: 4px;
}

/* CARD SYSTEM */
.card {
    background: #0f172a;
    padding: 16px;
    margin-bottom: 16px;
    border-radius: 16px;
    border: 1px solid #1e293b;
}

.card h3 {
    font-size: 1rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* FORM ELEMENTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    font-size: 0.9rem;
}

input:focus, select:focus {
    outline: none;
    border-color: #22c55e;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    transition: all 0.2s;
}

button:active {
    transform: scale(0.98);
}

.green { background: #22c55e; color: white; }
.red { background: #ef4444; color: white; }
.yellow { background: #f59e0b; color: white; }
.blue { background: #3b82f6; color: white; }
.purple { background: #8b5cf6; color: white; }

/* TABLE HYBRID - SCROLLABLE */
.table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.table {
    width: 100%;
    font-size: 0.75rem;
    border-collapse: collapse;
}

.table th {
    text-align: left;
    padding: 10px 8px;
    background: #1e293b;
    color: #94a3b8;
    font-weight: 600;
}

.table td {
    padding: 10px 8px;
    border-bottom: 1px solid #1e293b;
}

/* ALERT SYSTEM */
.alert {
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 0.85rem;
}

.alert-red {
    background: #7f1d1d;
    border-left: 4px solid #ef4444;
}

.alert-yellow {
    background: #78350f;
    border-left: 4px solid #f59e0b;
}

/* MAP */
#map {
    height: 280px;
    border-radius: 12px;
    width: 100%;
}

/* BUTTON GROUP */
.button-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
}

/* MODAL */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    visibility: hidden;
    opacity: 0;
    transition: all 0.2s;
}

.modal-overlay.active {
    visibility: visible;
    opacity: 1;
}

.modal-content {
    background: #0f172a;
    border-radius: 24px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    border: 1px solid #334155;
}

/* LOGIN BOX */
.login-box {
    max-width: 400px;
    margin: 0 auto;
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: white;
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 0.8rem;
    z-index: 2000;
    animation: fadeInUp 0.3s ease;
}

.toast.success { background: #22c55e; }
.toast.error { background: #ef4444; }
.toast.warning { background: #f59e0b; }

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

/* LOADER */
.loader {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
}

.badge-green { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
.badge-red { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
.badge-yellow { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }

/* RESPONSIVE - MOBILE FIRST */
@media (min-width: 768px) {
    .container {
        padding: 20px;
    }
    
    .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
    }
    
    .stat-number {
        font-size: 2.2rem;
    }
    
    .card {
        padding: 20px;
    }
    
    .table {
        font-size: 0.85rem;
    }
    
    #map {
        height: 350px;
    }
    
    .two-columns {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
}

@media (min-width: 1024px) {
    .container {
        padding: 24px;
    }
    
    .stats-grid {
        grid-template-columns: repeat(4, 1fr);
    }
    
    #map {
        height: 400px;
    }
}

/* TWO COLUMNS LAYOUT */
.two-columns {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
}

@media (min-width: 768px) {
    .two-columns {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* SCROLLBAR */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: #1e293b;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}
</style>
</head>

<script>
// ================= CONFIG =================
const BASE_URL = "https://vmsgw.mededsapam.workers.dev";
let autoBan = false;
let refreshInterval = null;

// ================= TOKEN MANAGEMENT =================
function getToken(){
    return localStorage.getItem("vms_auth_token");
}

function setToken(token){
    if(token){
        localStorage.setItem("vms_auth_token", token);
        console.log("[DEBUG] Token saved");
    } else {
        localStorage.removeItem("vms_auth_token");
        console.log("[DEBUG] Token removed");
    }
}

function getUserRole(){
    const role = localStorage.getItem("vms_user_role");
    return role || "UNKNOWN";
}

function setUserRole(role){
    if(role){
        localStorage.setItem("vms_user_role", role);
    }
}

// ================= TOAST NOTIFICATION =================
function showToast(message, type = "info"){
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ================= SAFE FETCH =================
async function safeFetch(url, opt = {}) {
    try {
        opt.headers = opt.headers || {};
        const token = getToken();
        
        if(token){
            opt.headers["x-token"] = token;
        }
        
        const r = await fetch(url, opt);
        
        if(r.status === 401){
            console.error("[ERROR] 401 Unauthorized");
            setToken(null);
            setUserRole(null);
            showToast("Session expired, please login again", "error");
            location.reload();
            return null;
        }
        
        if(!r.ok){
            const errorText = await r.text();
            console.error(`[ERROR] HTTP ${r.status}: ${errorText}`);
            return null;
        }
        
        return await r.json();
        
    } catch(e){
        console.error("[ERROR] safeFetch exception:", e);
        return null;
    }
}

// ================= FORCE INIT =================
async function forceInit(){
    try{
        showToast("Initializing system...", "info");
        const res = await fetch(BASE_URL + "/force-init", {
            method: "GET",
            headers: {"Content-Type": "application/json"}
        });
        
        const data = await res.json();
        
        if(data && data.ok){
            showToast(`✅ Init OK! Login with: ${data.username} / ${data.password}`, "success");
            document.getElementById('username').value = data.username;
            document.getElementById('password').value = data.password;
        } else {
            showToast("Force init failed: " + JSON.stringify(data), "error");
        }
    } catch(e){
        console.error("[ERROR] force-init exception:", e);
        showToast("Error: " + e.message, "error");
    }
}

// ================= CHECK KV STATUS =================
async function checkKV(){
    try{
        const res = await fetch(BASE_URL + "/debug-kv");
        const data = await res.json();
        
        let message = `KV Status:\n`;
        message += `KV Exists: ${data.kv_exists ? '✅' : '❌'}\n`;
        message += `Write Test: ${data.write_test ? '✅' : '❌'}\n`;
        message += `Read Test: ${data.read_test ? '✅' : '❌'}\n`;
        
        if(data.error){
            message += `\nError: ${data.error}`;
        }
        
        alert(message);
        
        if(!data.kv_exists || !data.write_test || !data.read_test){
            showToast("⚠️ KV Storage not working properly!", "error");
        } else {
            showToast("✅ KV Storage OK", "success");
        }
    } catch(e){
        console.error("[ERROR] checkKV exception:", e);
        showToast("Cannot check KV status", "error");
    }
}

// ================= LOGIN =================
async function login(){
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if(!username || !password){
        showToast("Please enter username and password", "warning");
        return;
    }
    
    try{
        showToast("Logging in...", "info");
        
        const res = await fetch(BASE_URL + "/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username, password })
        });
        
        const d = await res.json();
        
        if(d && d.ok === true && d.token){
            setToken(d.token);
            setUserRole(d.role);
            showToast(`Welcome ${username} (${d.role})`, "success");
            init();
        } else {
            showToast("Login failed: " + (d.error || "Invalid credentials"), "error");
        }
    } catch(e){
        console.error("[ERROR] Login exception:", e);
        showToast("Login error: " + e.message, "error");
    }
}

// ================= LOGOUT =================
function logout(){
    if(confirm("Yakin logout?")){
        localStorage.removeItem("vms_auth_token");
        localStorage.removeItem("vms_user_role");
        if(refreshInterval){
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
        showToast("Logged out successfully", "success");
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('app').style.display = "none";
        if(map){
            map.remove();
            map = null;
            markers = {};
        }
    }
}

// ================= INIT =================
function init(){
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('app').style.display = "block";
    
    const role = getUserRole();
    const roleDisplay = document.getElementById('userRoleDisplay');
    if(roleDisplay){
        roleDisplay.innerHTML = `👑 ${role}`;
    }
    
    initMap();
    loadAll();
    
    if(refreshInterval){
        clearInterval(refreshInterval);
    }
    refreshInterval = setInterval(loadAll, 5000);
}

    }).addTo(map);
}

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VMS WAR COMMAND CENTER</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial;background:#020617;color:white;margin:0}
.container{padding:16px}
.card{background:#0f172a;padding:16px;margin-bottom:12px;border-radius:12px}
input,select{width:100%;padding:8px;margin-bottom:10px;border-radius:8px;border:none}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.green{background:#22c55e}
.red{background:#ef4444}
.yellow{background:#f59e0b}
.table{width:100%;font-size:12px}
.table td{padding:6px;border-bottom:1px solid #1e293b}
.alert{padding:10px;margin-bottom:8px;border-radius:8px;font-weight:bold;}
.alert-red{background:#7f1d1d}
.alert-yellow{background:#78350f}
#map{height:250px;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<div id="loginBox" class="card">
<h3>Login</h3>
<input id="username">
<input id="password" type="password">
<button onclick="login()" class="green">LOGIN</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>System Stats</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>🔴 LIVE ALERT</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Devices</h3>
<div id="devices"></div>
</div>

<div class="card">
<h3>🗺️ LIVE GPS MAP</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>🚨 AUTO BAN</h3>
<button onclick="toggleAutoBan()" id="autoBanBtn" class="yellow">AUTO BAN OFF</button>
</div>

<div class="card">
<h3>User</h3>
<input id="newUser">
<input id="newPass">
<select id="role">
<option>ADMIN</option>
<option>OPERATOR</option>
</select>
<button onclick="addUser()" class="green">ADD</button>
<div id="userList"></div>
</div>

<div class="card">
<h3>🔐 Change Password</h3>
<input id="newPassword">
<button onclick="changePassword()" class="yellow">UPDATE PASSWORD</button>
</div>

</div>
</div>

<script>

// ================= CONFIG =================
const BASE_URL = "https://vmsgw.mededsapam.workers.dev";
let autoBan = false;

// 🔥 FIX TOKEN ANDROID
function getToken(){
return localStorage.getItem("token");
}

let map;
let markers = {};

// ================= MAP =================
function initMap(){
map = L.map('map').setView([-6.2,106.8], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ================= SAFE FETCH =================
async function safeFetch(url,opt={}){
try{
opt.headers = opt.headers || {};
opt.headers["x-token"] = getToken();

const r = await fetch(url,opt);

if(r.status===401){
localStorage.removeItem("token");
location.reload();
return null;
}

if(!r.ok) return null;
return await r.json();

}catch(e){return null;}
}

// ================= LOGIN =================
async function login(){
try{
const res = await fetch(BASE_URL+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username: username.value,
password: password.value
})
});

const d = await res.json();

if(d && d.ok){
localStorage.setItem("token", d.token);
init();
}else{
alert("LOGIN GAGAL");
}
}catch(e){
alert("ERROR LOGIN");
}
}

// ================= INIT =================
function init(){
loginBox.style.display="none";
app.style.display="block";
initMap();
loadAll();
}

// ================= LOAD =================
async function loadAll(){
const data = await safeFetch(BASE_URL+"/admin");
if(!data) return;

renderStats(data);
renderDevices(data.devices||{});
renderAlerts(data.devices||{});
renderMap(data.devices||{});
}

// ================= STATS =================
function renderStats(d){
stats.innerHTML = `
Devices: ${Object.keys(d.devices||{}).length}<br>
Licenses: ${Object.keys(d.licenses||{}).length}
`;
}

// ================= ALERT =================
function renderAlerts(dev){
let html="";
Object.entries(dev).forEach(([id,d])=>{
if(d.status==="SUSPICIOUS"){
html+=`<div class="alert alert-red">${id}</div>`;
}
if(d.status==="WARNING"){
html+=`<div class="alert alert-yellow">${id}</div>`;
}
});
alerts.innerHTML = html || "NO ALERT";
}

// ================= DEVICES =================
function renderDevices(dev){
let html="<table class='table'>";

Object.entries(dev).forEach(([id,d])=>{

let color="green";
if(d.status==="SUSPICIOUS") color="red";
if(d.status==="WARNING") color="yellow";

if(autoBan && d.status==="SUSPICIOUS"){
ban(d.license);
}

html+=`
<tr>
<td>${id}</td>
<td>${d.license}</td>
<td><span class="${color}">${d.status}</span></td>
<td>
<button class="red" onclick="ban('${d.license}')">BAN</button>
<button class="yellow" onclick="unban('${d.license}')">UNBAN</button>
<button onclick="resetDevice('${id}')">RESET</button>
</td>
</tr>
`;
});

html+="</table>";
devices.innerHTML=html;
}

// ================= MAP =================
function renderMap(dev){

Object.entries(dev).forEach(([id,d])=>{

if(!d.lastLocation) return;

const lat = d.lastLocation.lat;
const lng = d.lastLocation.lng;

let color = "green";
if(d.status==="SUSPICIOUS") color="red";
if(d.status==="WARNING") color="orange";

if(markers[id]){
markers[id].setLatLng([lat,lng]);
} else {
markers[id] = L.circleMarker([lat,lng],{
radius:8,
color:color,
fillColor:color,
fillOpacity:0.5
}).addTo(map).bindPopup(id);
}

map.setView([lat,lng], 15);

});
}

// ================= ACTION =================
async function ban(license){
await safeFetch(BASE_URL+"/ban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({license})});
}

async function unban(license){
await safeFetch(BASE_URL+"/unban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({license})});
}

async function resetDevice(id){
await safeFetch(BASE_URL+"/reset-device",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({deviceId:id})});
}

// ================= USER =================
async function addUser(){
await safeFetch(BASE_URL+"/add-user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
username:newUser.value,
password:newPass.value,
role:role.value
})});
}

// ================= PASSWORD =================
async function changePassword(){
await safeFetch(BASE_URL+"/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
newPassword:newPassword.value
})});
alert("UPDATED");
}

// ================= LOOP =================
setInterval(loadAll,2000);

// AUTO LOGIN
if(getToken()){
init();
}

</script>
</body>
</html>
